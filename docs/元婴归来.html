const stage=document.getElementById('stage'),subBox=document.getElementById('subtitle-box'),scTitle=document.getElementById('scene-title'),subText=document.getElementById('subtitle-text'),scInd=document.getElementById('scene-indicator'),epTitle=document.getElementById('episode-title'),ctrls=document.getElementById('controls');

const SCENES=[
{t:'片段01 - 元婴初成',s:'闭关洞府内灵气如潮水般翻涌，韩立盘坐于蒲团之上，头顶一个寸许高的元婴小人缓缓成型，通体金光璀璨。元婴面目与韩立一模一样，双手结印，散发出不属于金丹期的恐怖威压。'},
{t:'片段02 - 出关现世',s:'尘封多年的洞府石门缓缓开启，阳光倾洒而入。韩立负手走出，青衫飘逸，双目深邃如渊。举手投足间隐有天地法则相随，脚下青草在灵力滋润下疯狂生长。'},
{t:'片段03 - 故人相迎',s:'韩立出关的消息迅速传开，一位旧日道友匆匆赶来。两人相见，对方震惊得说不出话——面前之人的气息已完全超越金丹期范畴。韩立微微颔首，淡然一笑。'},
{t:'片段04 - 惊天噩耗',s:'旧友面色凝重，告知韩立——南宫婉即将与天南某大势力弟子双修。韩立瞳孔骤缩，手中茶盏应声碎裂，茶水顺着指缝滴落。空气仿佛凝固。'},
{t:'片段05 - 追问缘由',s:'韩立一把抓住旧友肩膀，追问南宫婉为何要与他人双修。旧友解释说这并非南宫婉本意——是掩月宗高层在多方压力下被迫做出的决定，对方以宗门存亡相要挟。'},
{t:'片段06 - 怒碎山石',s:'韩立情绪激荡之下，元婴期的恐怖灵压不受控制地外泄。脚下的山石寸寸碎裂，周围数十丈内的树木被气浪连根拔起。韩立的衣袍无风自动，长发飞扬。'},
{t:'片段07 - 强自镇定',s:'韩立闭目深吸一口气，将暴走的灵力强行收敛。再次睁眼时，目光已从狂怒转为冰冷如铁的决然。'},
{t:'片段08 - 往昔回忆·初遇',s:'回忆中，年轻的韩立在黄枫谷中第一次见到南宫婉。她身着白色纱裙，容颜绝世，正在花丛中练剑。花瓣随风飘舞，她回眸一笑，惊鸿一瞥。'},
{t:'片段09 - 往昔回忆·血色试炼',s:'血色试炼的地下洞穴中，韩立与南宫婉并肩对抗强敌。两人背靠背，配合默契。危急时刻，南宫婉替韩立挡下一击，生死与共的情愫悄然萌芽。'},
{t:'片段10 - 往昔回忆·定情',s:'月色如水的夜晚，韩立与南宫婉并肩坐于山崖之上。南宫婉将头轻轻靠在韩立肩上，韩立笨拙地将一件法器递给她作为定情之物。远处星河灿烂。'},
{t:'片段11 - 毅然决然',s:'韩立猛然起身，目光望向掩月宗方向，眼中再无半分犹豫。"我要去见她。"声音平静却带着不容置疑的坚定。身后，元婴期的灵力波动如山岳般沉稳厚重。'},
{t:'片段12 - 启程赶路',s:'韩立祭出飞行法宝，化作一道青色流光划破天际。云层被洞穿，气浪翻涌。大地山川河流飞速后退，韩立的背影在夕阳余晖中显得孤绝而决然。'},
{t:'片段13 - 掩月宗·双修筹备',s:'掩月宗内张灯结彩，处处悬挂红色灯笼和灵纹帷幔。一座华丽的双修法台矗立于宗门广场中央。然而繁华之下，不少弟子面露忧色。'},
{t:'片段14 - 南宫婉·困于绣楼',s:'南宫婉独坐于精致的闺房之中，身着大红嫁衣，却面无喜色。她的目光空洞地望着铜镜中的自己，指尖轻轻抚摸着一件旧物——正是韩立当年送她的定情法器。'},
{t:'片段15 - 双修对象',s:'一个身着华贵锦袍的年轻修士正得意洋洋地查看双修场地。他身后簇拥着一群随从，态度倨傲。此人是天南某大势力的核心弟子，仗着家族势力逼迫掩月宗。'},
{t:'片段16 - 途中遇妖',s:'飞行途中，一头体型巨大的妖兽从云层中扑出。韩立面不改色，随手一挥，一道凌厉的剑光横贯长空。妖兽甚至来不及惨叫，便被一分为二。元婴期的实力展露无遗。'},
{t:'片段17 - 路遇同道',s:'韩立途中遇到一群正在被追杀的散修。他本想赶路不管，但听到散修中有人提到"掩月宗"三个字，当即按下遁光，挡在散修面前，元婴灵压瞬间将黑衣人震慑。'},
{t:'片段18 - 获取情报',s:'被救的散修透露了重要情报——双修大典还有三日举行，且幕后推手另有其人，背后牵扯到天南数个大势力的利益交换。韩立暗暗松了口气——还有时间。'},
{t:'片段19 - 抵达掩月宗',s:'韩立终于抵达掩月宗山门。他没有隐藏气息，反而将元婴期的全部威压释放。恐怖的灵压如山岳倾覆，笼罩整个宗门。守山弟子双腿发软，数位长老同时睁开了眼睛。'},
{t:'片段20 - 月下独立',s:'夜幕降临，韩立立于掩月宗山门外的巨石之上，月光将他的影子拉得很长。他遥望宗门内灯火通明的双修大殿，目光中交织着怒火、思念与决然。明日，他要做一件事——把她带回来。'}
];

function stars(n,yMin,yMax){
  let s='';
  for(let i=0;i<n;i++){const x=Math.random()*W,y=yMin+Math.random()*(yMax-yMin),r=.5+Math.random()*1.5,d=2+Math.random()*4;

}

function clouds(n,yMin,yMax,c='rgba(255,255,255,0.15)'){
  let s='';
  for(let i=0;i<n;i++){const y=yMin+Math.random()*(yMax-yMin),d=30+Math.random()*40,del=-Math.random()*d,w=120+Math.random()*200;
  s+=`<g style="animation:cloudDrift ${d}s linear ${del}s infinite"><g transform="translate(-200,${y})">
    <ellipse cx="${w/2}" cy="30" rx="${w/2}" ry="20" fill="${c}"/>
    <ellipse cx="${w*.3}" cy="25" rx="${w*.25}" ry="18" fill="${c}"/>
    <ellipse cx="${w*.7}" cy="28" rx="${w*.2}" ry="15" fill="${c}"/>
  </g></g>`;}
  return s;
}

function mountains(c1,c2,yB){
  return `<path d="M0,${H} L0,${yB+100} Q100,${yB-50} 200,${yB+30} Q350,${yB-80} 500,${yB+10} Q650,${yB-60} 800,${yB+40} Q900,${yB-40} 1000,${yB+20} L1000,${H}Z" fill="${c2}" opacity=".5"/>
  <path d="M0,${H} L0,${yB+150} Q150,${yB+20} 300,${yB+80} Q450,${yB-20} 600,${yB+60} Q750,${yB} 900,${yB+100} L1000,${yB+70} L1000,${H}Z" fill="${c1}"/>`;
}

function particles(n,c,xMin,xMax,yMin,yMax){
  let s='';
  for(let i=0;i<n;i++){const x=xMin+Math.random()*(xMax-xMin),y=yMin+Math.random()*(yMax-yMin),d=2+Math.random()*3,del=-Math.random()*d,sz=2+Math.random()*4;
  s+=`<rect x="${x}" y="${y}" width="${sz}" height="${sz}" rx="${sz/2}" fill="${c}" style="animation:particleUp ${d}s ease-out ${del}s infinite"/>`;}
  return s;
}

      bg+=`<ellipse cx="350" cy="350" rx="30" ry="40" fill="#4a3a2a" stroke="#d4a843" stroke-width="2"/><ellipse cx="350" cy="350" rx="25" ry="35" fill="rgba(180,160,120,0.2)"/>`;
      // Table + artifact
      bg+=`<rect x="250" y="550" width="200" height="20" rx="2" fill="#4a2a1a"/>`;
      bg+=`<circle cx="350" cy="540" r="5" fill="rgba(100,200,255,0.5)"><animate attributeName="opacity" values=".3;.8;.3" dur="3s" repeatCount="indefinite"/></circle>`;
      // Watcher silhouette
      bg+=`<ellipse cx="740" cy="280" rx="12" ry="16" fill="rgba(0,0,0,0.5)"/>`;
      svg+=bg;
      svg+=nangongWan(520,520,1.7,{red:true,sad:true});
      break;
    case 14: // Arrogant guy
      bg=`<defs><linearGradient id="g14" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a1a10"/><stop offset="50%" stop-color="#3a2a15"/><stop offset="100%" stop-color="#1a1008"/></linearGradient></defs><rect width="${W}" height="${H}" fill="url(#g14)"/>`;
      for(let i=0;i<6;i++) bg+=`<g transform="translate(${150+i*140},${200+Math.random()*100})" style="animation:lanternSwing ${3+Math.random()*2}s ease-in-out infinite;transform-origin:${150+i*140}px ${185+Math.random()*100}px"><ellipse cx="0" cy="0" rx="6" ry="10" fill="#d4a843" opacity=".6"/></g>`;
      bg+=`<rect x="300" y="650" width="400" height="60" rx="5" fill="#5a3a1a" stroke="#d4a843"/>`;
      svg+=bg;
      svg+=arrogantGuy(500,550,1.8)+friend(280,620,1.0)+friend(720,620,1.0);
      break;
    case 15: // Demon battle
      bg=`<defs><linearGradient id="g15" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a1a3a"/><stop offset="40%" stop-color="#1a3a5a"/><stop offset="70%" stop-color="#2a4a6a"/><stop offset="100%" stop-color="#0a1a2a"/></linearGradient></defs><rect width="${W}" height="${H}" fill="url(#g15)"/>`;
      bg+=clouds(4,100,400,'rgba(200,220,255,0.2)');
      // Demon
      bg+=`<g transform="translate(650,350)" opacity=".9">
        <ellipse cx="0" cy="0" rx="80" ry="40" fill="#2a1a1a"/><ellipse cx="-50" cy="-10" rx="20" ry="12" fill="#3a1a1a"/>
        <circle cx="-55" cy="-14" r="5" fill="#ff3030"/><circle cx="-45" cy="-14" r="5" fill="#ff3030"/>
        <path d="M-70,-5 L-85,-15 L-80,5Z" fill="#4a1a1a"/>
        <path d="M40,20 L60,35 L45,40Z" fill="#2a1a1a"/><path d="M-30,25 L-50,40 L-35,42Z" fill="#2a1a1a"/>
      </g>`;
      // Sword light
      bg+=`<line x1="250" y1="450" x2="750" y2="300" stroke="rgba(200,220,255,0.9)" stroke-width="3"><animate attributeName="opacity" values="0;0;1;0" dur="3s" keyTimes="0;.4;.5;.8" repeatCount="indefinite"/></line>`;
      bg+=`<line x1="250" y1="460" x2="750" y2="310" stroke="rgba(150,180,255,0.5)" stroke-width="8"><animate attributeName="opacity" values="0;0;.5;0" dur="3s" keyTimes="0;.4;.5;.8" repeatCount="indefinite"/></line>`;
      // Blood
      for(let i=0;i<10;i++) bg+=`<circle cx="${550+Math.random()*250}" cy="350" r="${1+Math.random()*2}" fill="rgba(180,30,30,0.6)"><animate attributeName="cy" values="350;${600+Math.random()*300}" dur="${1+Math.random()*2}s" begin="${2+Math.random()}s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0;.8;0" dur="${1+Math.random()*2}s" begin="${2+Math.random()}s" repeatCount="indefinite"/></circle>`;
      svg+=bg;
      // Flying Han Li small
      svg+=`<g transform="translate(300,480) scale(1.5)" style="animation:float 2s ease-in-out infinite">
        <path d="M-12,-15 Q-15,10 -13,35 L13,35 Q15,10 12,-15Z" fill="#2a5a3a"/>
        <ellipse cx="0" cy="-28" rx="9" ry="12" fill="#f0d0a0"/><path d="M-9,-36 Q0,-44 9,-36" fill="#1a1a2a"/>
        <ellipse cx="-4" cy="-30" rx="2" ry="1.5" fill="#1a1a1a"/><ellipse cx="4" cy="-30" rx="2" ry="1.5" fill="#1a1a1a"/>
        <path d="M12,-10 Q30,-20 40,-25" stroke="#2a5a3a" stroke-width="6" fill="none" stroke-linecap="round"/>
        <line x1="40" y1="-25" x2="70" y2="-40" stroke="rgba(200,220,255,0.8)" stroke-width="2"/>
      </g>`;
      break;
    case 16: // Rescue scattered cultivators
      bg=`<defs><linearGradient id="g16" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#151a25"/><stop offset="40%" stop-color="#1a2030"/><stop offset="100%" stop-color="#101520"/></linearGradient></defs><rect width="${W}" height="${H}" fill="url(#g16)"/>`;
      bg+=mountains('#0a1015','#101520',600);
      bg+=`<circle cx="400" cy="550" r="20" fill="none" stroke="rgba(212,168,67,0.5)" stroke-width="2" style="animation:shockwave 2s linear infinite"/>`;
      svg+=bg;
      svg+=hanLi(400,520,1.8,{glow:true})+blackGuy(650,600,.9)+blackGuy(700,620,.9)+blackGuy(730,610,.9);
      svg+=friend(200,650,.9)+friend(280,680,.8);
      break;
    case 17: // Get intel, campfire
      bg=`<defs><linearGradient id="g17" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a2515"/><stop offset="40%" stop-color="#20301a"/><stop offset="100%" stop-color="#101a0a"/></linearGradient></defs><rect width="${W}" height="${H}" fill="url(#g17)"/>`;
      bg+=mountains('#0a150a','#10200a',600);
      // Campfire
      bg+=`<g transform="translate(450,720)"><polygon points="-15,0 -10,-5 -5,0 0,-8 5,0 10,-5 15,0" fill="#3a1a0a"/><ellipse cx="0" cy="-15" rx="10" ry="18" fill="rgba(255,150,50,0.4)"><animate attributeName="ry" values="16;22;16" dur=".5s" repeatCount="indefinite"/></ellipse><ellipse cx="0" cy="-18" rx="5" ry="10" fill="rgba(255,200,50,0.5)"><animate attributeName="ry" values="8;12;8" dur=".3s" repeatCount="indefinite"/></ellipse></g>`;
      bg+=particles(8,'rgba(255,180,50,0.5)',400,500,550,700);
      svg+=bg;
      svg+=hanLi(350,550,1.7)+friend(550,600,1.4);
      break;
    case 18: // Arrive at sect
      bg=`<defs><linearGradient id="g18" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0820"/><stop offset="30%" stop-color="#1a1040"/><stop offset="100%" stop-color="#100a2a"/></linearGradient></defs><rect width="${W}" height="${H}" fill="url(#g18)"/>`;
      // Gate
      bg+=`<rect x="350" y="200" width="300" height="450" fill="#1a1530" stroke="#3a2a5a" stroke-width="3" rx="3"/><path d="M330,200 L500,80 L670,200" fill="#2a1a3a" stroke="#4a3a5a" stroke-width="2"/>`;
      bg+=`<rect x="370" y="220" width="40" height="400" fill="#2a2040"/><rect x="590" y="220" width="40" height="400" fill="#2a2040"/>`;
      bg+=`<text x="390" y="380" fill="#d4a843" font-size="28" font-family="SimSun">掩</text><text x="390" y="430" fill="#d4a843" font-size="28" font-family="SimSun">月</text><text x="390" y="480" fill="#d4a843" font-size="28" font-family="SimSun">宗</text>`;
      // Pressure waves
      for(let i=0;i<4;i++) bg+=`<circle cx="500" cy="700" r="20" fill="none" stroke="rgba(212,168,67,${.6-i*.1})" stroke-width="2" style="animation:shockwave 3s linear ${i*.5}s infinite"/>`;
      // Guards
      bg+=`<g transform="translate(380,720) scale(0.7)"><path d="M-8,-10 Q-10,8 -8,28 L8,28 Q10,8 8,-10Z" fill="#2a2a4a"/><ellipse cx="0" cy="-18" rx="7" ry="9" fill="#e0c0a0"/><ellipse cx="-3" cy="-19" rx="2" ry="3" fill="#fff"/><ellipse cx="3" cy="-19" rx="2" ry="3" fill="#fff"/></g>`;
      bg+=`<g transform="translate(620,720) scale(0.7)"><path d="M-8,-10 Q-10,8 -8,28 L8,28 Q10,8 8,-10Z" fill="#2a2a4a"/><ellipse cx="0" cy="-18" rx="7" ry="9" fill="#e0c0a0"/><ellipse cx="-3" cy="-19" rx="2" ry="3" fill="#fff"/><ellipse cx="3" cy="-19" rx="2" ry="3" fill="#fff"/></g>`;
      svg+=bg;
      svg+=hanLi(500,620,1.8,{hair:true,glow:true,angry:true});
      break;
    case 19: // Moonlit silhouette
      bg=`<defs><linearGradient id="g19" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#050510"/><stop offset="30%" stop-color="#0a0a20"/><stop offset="100%" stop-color="#080818"/></linearGradient></defs><rect width="${W}" height="${H}" fill="url(#g19)"/>`;
      bg+=stars(80,0,500);
      bg+=`<circle cx="700" cy="180" r="60" fill="#f0e8c0" opacity=".85"/><circle cx="730" cy="150" r="55" fill="#050510"/>`;
      bg+=`<polygon points="700,0 300,${H} 600,${H}" fill="rgba(200,200,240,0.03)"/>`;
      // Distant buildings
      bg+=`<g opacity=".6"><rect x="600" y="550" width="80" height="200" fill="#1a1525"/><rect x="700" y="500" width="60" height="250" fill="#1a1525"/><rect x="780" y="550" width="70" height="200" fill="#1a1525"/>`;
      for(let i=0;i<6;i++) bg+=`<rect x="${610+Math.floor(i/2)*100+Math.random()*40}" y="${580+i*30}" width="15" height="20" fill="rgba(255,200,100,0.6)"/>`;
      bg+=`</g>`;
      // Rock
      bg+=`<path d="M200,${H} L250,680 Q300,620 400,650 Q450,600 500,630 L550,700 L550,${H}Z" fill="#0a0a15"/>`;
      bg+=`<path d="M380,650 L200,950 L300,950 L420,650Z" fill="rgba(0,0,0,0.3)"/>`;
      // Wind
      for(let i=0;i<5;i++) bg+=`<line x1="${50+Math.random()*200}" y1="${400+Math.random()*200}" x2="${250+Math.random()*200}" y2="${350+Math.random()*150}" stroke="rgba(200,200,240,0.1)" stroke-width="1"><animate attributeName="x1" values="${50+Math.random()*200};-200" dur="${1.5+Math.random()*2}s" repeatCount="indefinite"/><animate attributeName="x2" values="${250+Math.random()*200};100" dur="${1.5+Math.random()*2}s" repeatCount="indefinite"/></line>`;
      svg+=bg;
      // Silhouette Han Li
      svg+=`<g transform="translate(380,520) scale(1.8)">
        <g style="animation:breathe 5s ease-in-out infinite;transform-origin:0 0"><path d="M-15,-18 Q-18,18 -16,55 L16,55 Q18,18 15,-18Z" fill="#0a0a15" stroke="#1a1a30"/><path d="M-16,-12 Q-30,5 -28,22" stroke="#0a0a15" stroke-width="7" fill="none"/><path d="M16,-12 Q30,5 28,22" stroke="#0a0a15" stroke-width="7" fill="none"/></g>
        <g style="animation:float 7s ease-in-out infinite;transform-origin:0 -34px"><ellipse cx="0" cy="-34" rx="12" ry="15" fill="#0a0a15"/><path d="M-14,-40 Q-22,-15 -24,25" stroke="#0a0a15" stroke-width="4" fill="none"/><path d="M14,-40 Q22,-15 24,25" stroke="#0a0a15" stroke-width="4" fill="none"/><path d="M-12,-42 Q0,-52 12,-42" fill="#0a0a15"/></g>
        <path d="M-16,40 Q-25,50 -22,60" stroke="#0a0a15" stroke-width="5" fill="none"><animate attributeName="d" values="M-16,40 Q-25,50 -22,60;M-16,40 Q-28,48 -25,60;M-16,40 Q-25,50 -22,60" dur="3s" repeatCount="indefinite"/></path>
        <circle cx="-4" cy="-36" r="1.5" fill="rgba(212,168,67,0.8)"><animate attributeName="opacity" values=".5;1;.5" dur="3s" repeatCount="indefinite"/></circle>
        <circle cx="4" cy="-36" r="1.5" fill="rgba(212,168,67,0.8)"><animate attributeName="opacity" values=".5;1;.5" dur="3s" repeatCount="indefinite"/></circle>
      </g>`;
      break;
  }
  svg+=`</svg>`;
  return svg;
}

// === Navigation ===
epTitle.addEventListener('click',()=>{epTitle.style.opacity='0';setTimeout(()=>{epTitle.style.display='none';subBox.style.display='block';ctrls.style.display='flex';goTo(0)},2000)});
document.getElementById('btn-prev').addEventListener('click',()=>{if(cur>0)goTo(cur-1)});
document.getElementById('btn-next').addEventListener('click',()=>{if(cur<SCENES.length-1)goTo(cur+1)});
document.getElementById('btn-auto').addEventListener('click',toggleAuto);
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(cur<SCENES.length-1)goTo(cur+1)}if(e.key==='ArrowLeft'&&cur>0)goTo(cur-1)});

function toggleAuto(){auto=!auto;document.getElementById('btn-auto').textContent=auto?'⏸ 暂停':'▶ 自动播放';if(auto)schedAuto();else clearTimeout(aTimer)}
function schedAuto(){if(!auto)return;aTimer=setTimeout(()=>{if(cur<SCENES.length-1){goTo(cur+1);schedAuto()}else{auto=false;document.getElementById('btn-auto').textContent='▶ 自动播放'}},10000)}

function goTo(idx){
  clearTimeout(tTimer);
  document.querySelectorAll('.scene.active').forEach(e=>e.classList.remove('active'));
  let el=document.getElementById('sc-'+idx);
  if(!el){el=document.createElement('div');el.className='scene';el.id='sc-'+idx;el.innerHTML=drawScene(idx);stage.appendChild(el)}
  setTimeout(()=>el.classList.add('active'),50);
  cur=idx;
  scTitle.textContent=SCENES[idx].t;
  scInd.textContent=`${idx+1} / ${SCENES.length}`;
  typeText(SCENES[idx].s);
}

function typeText(text){
  subText.innerHTML='';let i=0;
  const c=document.createElement('span');c.className='cursor';
  function t(){if(i<text.length){subText.textContent=text.slice(0,i+1);subText.appendChild(c);i++;tTimer=setTimeout(t,45)}else{subText.textContent=text}}
  t();
}
</script>
