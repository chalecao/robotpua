<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;font-family:'SimSun','STSong',serif;background:#000}
#stage{width:100vw;height:100vh;position:relative;overflow:hidden}
.scene{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;transition:opacity 1.5s ease;pointer-events:none}

#subtitle-box{position:fixed;bottom:0;left:0;width:100%;z-index:1000;background:linear-gradient(transparent,rgba(0,0,0,0.85) 30%);padding:20px 60px 30px;min-height:100px;display:none}
#scene-title{color:#d4a843;font-size:18px;margin-bottom:8px;letter-spacing:3px;font-weight:bold;text-shadow:0 0 10px rgba(212,168,67,0.5)}
#subtitle-text{color:#eee;font-size:20px;line-height:1.8;letter-spacing:2px;text-shadow:1px 1px 3px rgba(0,0,0,0.8);min-height:36px}
.cursor{display:inline-block;width:2px;height:22px;background:#d4a843;margin-left:2px;animation:blink .8s infinite;vertical-align:middle}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
#controls{position:fixed;bottom:30px;right:40px;z-index:1001;display:none;gap:12px;align-items:center}
#controls button{background:rgba(212,168,67,0.2);border:1px solid rgba(212,168,67,0.5);color:#d4a843;padding:8px 18px;cursor:pointer;font-size:14px;letter-spacing:1px;border-radius:4px;transition:all .3s;font-family:inherit}
#controls button:hover{background:rgba(212,168,67,0.4)}
#scene-indicator{color:rgba(212,168,67,0.7);font-size:13px}
#episode-title{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2000;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;opacity:1;transition:opacity 2s ease}
#episode-title h1{color:#d4a843;font-size:48px;letter-spacing:12px;text-shadow:0 0 30px rgba(212,168,67,0.4);animation:titleGlow 3s ease-in-out infinite}
#episode-title h2{color:#999;font-size:22px;letter-spacing:6px;margin-top:20px;font-weight:normal}
.start-hint{color:rgba(212,168,67,0.5);font-size:16px;margin-top:60px;animation:pulse 2s ease-in-out infinite}
@keyframes titleGlow{0%,100%{text-shadow:0 0 30px rgba(212,168,67,0.4)}50%{text-shadow:0 0 60px rgba(212,168,67,0.8),0 0 100px rgba(212,168,67,0.3)}}

@keyframes particleUp{0%{transform:translateY(0) scale(1);opacity:.8}100%{transform:translateY(-200px) scale(.2);opacity:0}}
@keyframes shockwave{0%{r:20;opacity:.7}100%{r:400;opacity:0}}
@keyframes shake{0%,100%{transform:translate(0,0)}10%{transform:translate(-6px,3px)}20%{transform:translate(5px,-5px)}30%{transform:translate(-3px,6px)}40%{transform:translate(6px,-2px)}50%{transform:translate(-5px,-3px)}60%{transform:translate(3px,5px)}70%{transform:translate(-6px,2px)}80%{transform:translate(5px,-6px)}90%{transform:translate(-2px,3px)}}
@keyframes lanternSwing{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes swordGlow{0%,100%{opacity:.4;filter:drop-shadow(0 0 4px rgba(200,220,255,0.5))}50%{opacity:1;filter:drop-shadow(0 0 12px rgba(200,220,255,0.9))}}
@keyframes fireFlicker{0%,100%{transform:scaleY(1) scaleX(1)}25%{transform:scaleY(1.1) scaleX(0.95)}50%{transform:scaleY(0.9) scaleX(1.05)}75%{transform:scaleY(1.05) scaleX(0.98)}}
@keyframes rainDrop{0%{transform:translateY(-100px);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(1100px);opacity:0}}

<script>
const W=1000,H=1000;
let cur=-1,auto=false,aTimer=null,tTimer=null;
const stage=document.getElementById('stage'),subBox=document.getElementById('subtitle-box'),scTitle=document.getElementById('scene-title'),subText=document.getElementById('subtitle-text'),scInd=document.getElementById('scene-indicator'),epTitle=document.getElementById('episode-title'),ctrls=document.getElementById('controls');

const SCENES=[
{t:'片段01 - 山门对峙',s:'清晨，韩立踏过掩月宗山门，守山弟子列阵拦路。韩立目光如刀，元婴灵压如实质般碾压过去，弟子们的法器纷纷震颤，阵型摇摇欲坠。韩立一步一顿，每一步都在青石板上留下深深的脚印。'},
{t:'片段02 - 通传宗门',s:'一名长老急匆匆赶往宗主大殿，沿途连发数道传讯灵光。宗门内气氛骤然紧张，正在布置双修大典的弟子们面面相觑。远处山巅，一道青色身影正缓缓走来，虽未动武，气势却已令天地变色。'},
{t:'片段03 - 长老会紧急召开',s:'掩月宗议事大殿内，七位长老分坐两侧，宗主居中。众人面色各异——有愤怒、有忌惮、有无奈。一位白发长老拍案而起，主张以宗门之力镇压韩立；另一位女长老则面色忧虑，认为与元婴修士为敌并非明智之举。'},
{t:'片段04 - 大殿正面对峙',s:'韩立大步迈入议事大殿，与七位长老正面对峙。他负手而立，目光扫过在座每一位长老，声音冰冷地开口："南宫婉在哪里？"大殿内灵力暗涌，长老们的护体灵光不自觉亮起。空气如弓弦般紧绷。'},
{t:'片段05 - 双修大典中断',s:'双修大典现场，红绸飘舞、宾客满座。忽然一声巨响，法台四周的禁制被强行撕裂。韩立的声音响彻整个广场："这场双修，到此为止。"在场宾客哗然，南宫婉猛然抬头，眼中闪过难以置信的光芒。'},
{t:'片段06 - 魏无涯现身',s:'一个身着黑色锦袍的中年修士从贵宾席中缓缓走出，正是幕后推手魏无涯。他面带冷笑，身后跟着数名金丹后期高手。魏无涯开口嘲讽韩立不自量力，一个刚入元婴的修士竟敢挑战天南势力联盟。黑袍猎猎，气势阴冷。'},
{t:'片段07 - 真相大白',s:'韩立与魏无涯言语交锋，魏无涯得意之下道出真相——他早已觊觎南宫婉的特殊体质，双修不过是为了夺取她的元阴之力突破瓶颈。且他暗中勾结掩月宗叛徒，以宗门安危相要挟。南宫婉闻言面色惨白，身体微微发抖。'},
{t:'片段08 - 韩立与南宫婉重逢',s:'韩立穿过人群，走到南宫婉面前。两人四目相对，千言万语尽在不言中。南宫婉的眼泪无声滑落，韩立伸手轻轻擦去她的泪水，声音低沉而坚定："我来了，没有人能强迫你。"身后红绸飘扬，恍若隔世。'},
{t:'片段09 - 联手突围',s:'魏无涯一声令下，十余名高手同时出手围攻韩立。韩立护住南宫婉，右手祭出青竹蜂云剑，左手施展大衍决。剑光如暴雨倾泻，与十余名高手的法器正面碰撞，火花四溅，大殿被战斗余波震得摇摇欲坠。'},
{t:'片段10 - 元婴之威',s:'韩立全力爆发，元婴期的恐怖实力彻底展现。一道金色法相从他身后浮现，高达数丈，正是元婴法相。法相一掌拍出，直接将三名金丹修士拍飞，撞塌数面墙壁。在场所有人目瞪口呆——这份实力远超他们对元婴初期的认知。'},
{t:'片段11 - 禁制封锁',s:'掩月宗宗主终于出手，启动了宗门大阵。无数灵纹从地面亮起，形成一座巨大的封锁禁制，将韩立和南宫婉困在其中。禁制内灵力紊乱，飞行受限。韩立眉头紧锁，南宫婉指出禁制核心位置——她曾在掩月宗修炼多年，熟知宗门阵法。'},
{t:'片段12 - 破阵而出',s:'韩立按照南宫婉的指引，集中全力攻击禁制核心。青竹蜂云剑化作一道金色洪流，配合噬金虫的吞噬之力，硬生生撕开禁制一道裂口。碎石飞溅，灵光明灭，两人从裂缝中冲出的瞬间，身后的禁制轰然崩塌。'},
{t:'片段13 - 宗门混战',s:'禁制崩塌后，掩月宗陷入混乱。支持韩立的长老与魏无涯一方发生冲突，宗门内到处是法术交锋的光芒。韩立趁乱护着南宫婉向山门方向突围，一路击退拦路者。远处浓烟滚滚，数座建筑在战斗中被毁。'},
{t:'片段14 - 长老拦路',s:'一名元婴初期的掩月宗长老挡在韩立面前，此人一直主张与魏无涯结盟。两人短兵相接，法力碰撞产生剧烈的灵力风暴。韩立以青竹蜂云剑对敌，三十回合后以一招之差将对方击退。长老吐血后退，眼中满是不可置信。'},
{t:'片段15 - 杀出山门',s:'韩立拉着南宫婉的手，冲出掩月宗山门。身后追兵数十人，法术如流星雨般追来。韩立回身祭出一面金色盾牌法宝，挡下大部分攻击，同时催动遁术，两人化作一道流光消失在天际。追兵望尘莫及。'},
{t:'片段16 - 逃亡密林',s:'韩立带着南宫婉遁入一片古老的密林。林中灵雾弥漫，遮蔽了追踪灵识。两人落地后急速穿行，韩立一边跑一边布下迷惑阵法。身后隐约传来追兵的呼喝声，但越来越远。阳光透过树叶缝隙洒下斑驳光影。'},
{t:'片段17 - 发现隐秘山洞',s:'南宫婉发现了一处被藤蔓遮掩的隐秘山洞，洞口有天然灵气屏障，可以遮蔽气息。两人进入山洞，韩立立刻布下多重禁制。洞内幽暗潮湿，但暂时安全。两人终于有了片刻喘息的机会。'},
{t:'片段18 - 洞中温情',s:'洞中篝火跳动，南宫婉靠在韩立肩上，轻声诉说这些年的思念与苦楚。韩立沉默不语，只是将她搂得更紧。火光映照两人面庞，洞外月光如水。这一刻，所有的危险与追兵仿佛都与他们无关。'},
{t:'片段19 - 追兵逼近',s:'天色微明，洞外传来密集的脚步声和灵力波动。魏无涯的追兵找到了这片密林，正在逐寸搜索。韩立的禁制虽然遮蔽了气息，但搜索范围在不断缩小。韩立缓缓起身，目光冷静——他知道，战斗不可避免。'},
{t:'片段20 - 新的征程',s:'韩立带着南宫婉从山洞另一出口离开，望向远方茫茫的山川。他知道天南已不是久留之地，魏无涯背后的势力联盟不会善罢甘休。韩立指向东南方向——那里是乱星海的入口，一片充满机遇与危险的新天地。新的征程即将开始。'}
];

// === SVG Character Helpers ===
function hanLi(x,y,sc=1,opts={}){
  const {sit,hair,glow,angry,fighting,run}=opts;
  let s=`<g transform="translate(${x},${y}) scale(${sc})">`;
  if(glow) s+=`<ellipse cx="0" cy="-30" rx="50" ry="80" fill="none" stroke="rgba(212,168,67,0.25)" stroke-width="2"><animate attributeName="rx" values="45;55;45" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/></ellipse>`;
  s+=`<g style="animation:breathe 4s ease-in-out infinite;transform-origin:0 0">`;
  s+=`<path d="M-18,-20 Q-22,20 -20,60 L20,60 Q22,20 18,-20Z" fill="#2a5a3a" stroke="#1a3a2a"/>`;
  if(!sit){
    const legAnim=run?`<animateTransform attributeName="transform" type="rotate" values="-15,0,58;15,0,58;-15,0,58" dur="0.6s" repeatCount="indefinite"/>`:'';
    const legAnim2=run?`<animateTransform attributeName="transform" type="rotate" values="15,0,58;-15,0,58;15,0,58" dur="0.6s" repeatCount="indefinite"/>`:'';
    s+=`<g style="animation:${run?'none':'sway 1.5s ease-in-out infinite'};transform-origin:-7px 58px">${legAnim?'<g>'+legAnim:''}<rect x="-12" y="58" width="10" height="30" rx="3" fill="#1a3a2a"/><rect x="-12" y="85" width="10" height="25" rx="3" fill="#152a20"/>${legAnim?'</g>':''}</g>`;
    s+=`<g style="animation:${run?'none':'sway 1.5s ease-in-out .75s infinite'};transform-origin:7px 58px">${legAnim2?'<g>'+legAnim2:''}<rect x="2" y="58" width="10" height="30" rx="3" fill="#1a3a2a"/><rect x="2" y="85" width="10" height="25" rx="3" fill="#152a20"/>${legAnim2?'</g>':''}</g>`;
  }
  const armAnim=fighting?`<animateTransform attributeName="transform" type="rotate" values="-30,-18,-15;30,-18,-15;-30,-18,-15" dur="0.4s" repeatCount="indefinite"/>`:'';
  s+=`<g style="animation:${fighting?'none':'sway 3s ease-in-out infinite'};transform-origin:-18px -15px">${armAnim?'<g>'+armAnim:''}<path d="M-18,-15 Q-35,5 -30,25" stroke="#2a5a3a" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="-30" cy="27" r="4" fill="#f0d0a0"/>${armAnim?'</g>':''}</g>`;
  s+=`<g style="animation:${fighting?'none':'sway 3s ease-in-out 1.5s infinite'};transform-origin:18px -15px"><path d="M18,-15 Q35,5 30,25" stroke="#2a5a3a" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="30" cy="27" r="4" fill="#f0d0a0"/></g>`;
  s+=`</g>`;
  s+=`<g style="animation:float 6s ease-in-out infinite;transform-origin:0 -38px">`;
  s+=`<ellipse cx="0" cy="-38" rx="14" ry="17" fill="#f0d0a0"/>`;
  if(hair){
    s+=`<path d="M-14,-48 Q0,-58 14,-48" fill="#1a1a2a"/>`;
    s+=`<path d="M-16,-42 Q-30,-10 -28,30" stroke="#1a1a2a" stroke-width="4" fill="none" opacity=".6"/>`;
    s+=`<path d="M16,-42 Q30,-10 28,30" stroke="#1a1a2a" stroke-width="4" fill="none" opacity=".6"/>`;
  } else {
    s+=`<path d="M-14,-48 Q0,-58 14,-48" fill="#1a1a2a"/>`;
    s+=`<rect x="-3" y="-58" width="6" height="12" rx="3" fill="#1a1a2a"/>`;
  }
  s+=`<ellipse cx="-5" cy="-40" rx="2.5" ry="2" fill="#1a1a1a"/><ellipse cx="5" cy="-40" rx="2.5" ry="2" fill="#1a1a1a"/>`;
  if(angry) s+=`<line x1="-8" y1="-45" x2="-3" y2="-43" stroke="#1a1a1a" stroke-width="1.5"/><line x1="8" y1="-45" x2="3" y2="-43" stroke="#1a1a1a" stroke-width="1.5"/>`;
  s+=`<path d="M-3,-33 Q0,-31 3,-33" stroke="#c08060" stroke-width="1" fill="none"><animate attributeName="d" values="M-3,-33 Q0,-31 3,-33;M-3,-33 Q0,-29 3,-33;M-3,-33 Q0,-31 3,-33" dur="2s" repeatCount="indefinite"/></path>`;
  s+=`</g></g>`;
  return s;
}

function nangongWan(x,y,sc=1,opts={}){
  const {red,sad,happy}=opts;
  const dc=red?'#c02030':'#e8e8f0',ds=red?'#801020':'#b0b0c0';
  let s=`<g transform="translate(${x},${y}) scale(${sc})">`;
  s+=`<g style="animation:breathe 5s ease-in-out infinite;transform-origin:0 0">`;
  s+=`<path d="M-16,-20 Q-20,20 -18,55 L18,55 Q20,20 16,-20Z" fill="${dc}" stroke="${ds}"/>`;
  s+=`<path d="M-18,55 Q-22,70 -15,85 L-5,85 L-5,55Z" fill="${dc}" stroke="${ds}" stroke-width=".5"/>`;
  s+=`<path d="M18,55 Q22,70 15,85 L5,85 L5,55Z" fill="${dc}" stroke="${ds}" stroke-width=".5"/>`;
  s+=`<g style="animation:sway 4s ease-in-out infinite;transform-origin:-16px -15px"><path d="M-16,-15 Q-30,5 -25,22" stroke="${dc}" stroke-width="7" fill="none" stroke-linecap="round"/><circle cx="-25" cy="24" r="3.5" fill="#f5ddc0"/></g>`;
  s+=`<g style="animation:sway 4s ease-in-out 2s infinite;transform-origin:16px -15px"><path d="M16,-15 Q30,5 25,22" stroke="${dc}" stroke-width="7" fill="none" stroke-linecap="round"/><circle cx="25" cy="24" r="3.5" fill="#f5ddc0"/></g>`;
  s+=`</g>`;
  s+=`<g style="animation:float 7s ease-in-out infinite;transform-origin:0 -36px">`;
  s+=`<ellipse cx="0" cy="-36" rx="13" ry="16" fill="#f5ddc0"/>`;
  s+=`<path d="M-13,-44 Q0,-56 13,-44" fill="#1a1a2a"/>`;
  s+=`<path d="M-15,-40 Q-22,-20 -20,10" stroke="#1a1a2a" stroke-width="3" fill="none"/>`;
  s+=`<path d="M15,-40 Q22,-20 20,10" stroke="#1a1a2a" stroke-width="3" fill="none"/>`;
  if(red) s+=`<path d="M-8,-52 Q0,-60 8,-52" fill="#d4a843" opacity=".8"/><circle cx="0" cy="-54" r="3" fill="#d4a843"/>`;
  s+=`<ellipse cx="-5" cy="-38" rx="2.2" ry="2" fill="#2a1a1a"/><ellipse cx="5" cy="-38" rx="2.2" ry="2" fill="#2a1a1a"/>`;
  if(sad){
    s+=`<path d="M-3,-31 Q0,-33 3,-31" stroke="#c08060" fill="none"/>`;
    s+=`<circle cx="-8" cy="-33" r="1.5" fill="rgba(100,180,255,0.6)"><animate attributeName="cy" values="-33;-15" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".8;0" dur="2s" repeatCount="indefinite"/></circle>`;
    s+=`<circle cx="8" cy="-34" r="1.2" fill="rgba(100,180,255,0.5)"><animate attributeName="cy" values="-34;-16" dur="2.5s" repeatCount="indefinite"/><animate attributeName="opacity" values=".7;0" dur="2.5s" repeatCount="indefinite"/></circle>`;
  } else if(happy){
    s+=`<path d="M-3,-31 Q0,-28 3,-31" stroke="#c08060" fill="none"/>`;
  } else {
    s+=`<path d="M-3,-31 Q0,-29 3,-31" stroke="#c08060" fill="none"/>`;
  }
  s+=`</g></g>`;
  return s;
}

function weiWuya(x,y,sc=1,opts={}){
  const {smirk}=opts||{};
  let s=`<g transform="translate(${x},${y}) scale(${sc})">`;
  s+=`<ellipse cx="0" cy="-30" rx="45" ry="70" fill="none" stroke="rgba(80,20,80,0.2)" stroke-width="2"><animate attributeName="opacity" values=".2;.5;.2" dur="3s" repeatCount="indefinite"/></ellipse>`;
  s+=`<g style="animation:breathe 4.5s ease-in-out infinite;transform-origin:0 0">`;

// === Background helpers ===
function stars(n,yMin,yMax){
  let s='';
  for(let i=0;i<n;i++){const x=Math.random()*W,y=yMin+Math.random()*(yMax-yMin),r=.5+Math.random()*1.5,d=2+Math.random()*4;

  return s;
}

function clouds(n,yMin,yMax,c='rgba(255,255,255,0.15)'){
  let s='';
  for(let i=0;i<n;i++){const y=yMin+Math.random()*(yMax-yMin),d=30+Math.random()*40,del=-Math.random()*d,w=120+Math.random()*200;

  return s;
}

function mountains(c1,c2,yB){
  return `<path d="M0,${H} L0,${yB+100} Q100,${yB-50} 200,${yB+30} Q350,${yB-80} 500,${yB+10} Q650,${yB-60} 800,${yB+40} Q900,${yB-40} 1000,${yB+20} L1000,${H}Z" fill="${c2}" opacity=".5"/>

function particles(n,c,xMin,xMax,yMin,yMax){
  let s='';

      bg+=`<path d="M0,0 L${W},0 L${W},200 Q800,280 600,250 Q400,300 200,260 L0,200Z" fill="#0a0505"/>`;
      bg+=`<path d="M0,0 Q150,100 100,${H}" fill="#080404" opacity=".8"/>`;
      bg+=`<path d="M${W},0 Q850,100 900,${H}" fill="#080404" opacity=".8"/>`;
      // Campfire
      bg+=`<g transform="translate(500,700)">
        <polygon points="-20,0 -15,-8 -8,0 -3,-12 3,0 8,-8 15,0 20,-5 25,0" fill="#3a1a0a"/>
        <g style="animation:fireFlicker 0.5s ease-in-out infinite">
          <ellipse cx="0" cy="-25" rx="15" ry="28" fill="rgba(255,120,30,0.5)"/>
          <ellipse cx="0" cy="-30" rx="8" ry="18" fill="rgba(255,180,50,0.6)"/>
          <ellipse cx="0" cy="-35" rx="4" ry="10" fill="rgba(255,230,100,0.7)"/>
        </g>
      </g>`;
      // Fire light on walls
      bg+=`<ellipse cx="500" cy="600" rx="200" ry="150" fill="rgba(255,150,50,0.04)"><animate attributeName="rx" values="190;210;190" dur="1s" repeatCount="indefinite"/></ellipse>`;
      // Moon through cave entrance
      bg+=`<circle cx="850" cy="150" r="30" fill="rgba(240,232,192,0.3)"/>`;
      bg+=particles(8,'rgba(255,180,50,0.4)',400,600,550,680);
      svg+=bg;
      // Han Li and Nangong Wan together
      svg+=hanLi(440,580,1.6,{sit:true});
      svg+=nangongWan(540,590,1.4,{happy:true});
      break;
    }
    case 18: { // Pursuers approach - dawn
      bg=`<defs><linearGradient id="g18" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a2a3a"/><stop offset="20%" stop-color="#3a3a4a"/><stop offset="40%" stop-color="#4a4a5a"/><stop offset="100%" stop-color="#1a1a2a"/></linearGradient></defs><rect width="${W}" height="${H}" fill="url(#g18)"/>`;
      // Trees in dawn light
      for(let i=0;i<10;i++){const tx=50+i*100;
        bg+=`<rect x="${tx}" y="${150+Math.random()*100}" width="${6+Math.random()*5}" height="${500+Math.random()*200}" fill="#1a1a2a" opacity="${.5+Math.random()*.3}"/>`;
        bg+=`<ellipse cx="${tx+3}" cy="${130+Math.random()*80}" rx="${25+Math.random()*20}" ry="${20+Math.random()*15}" fill="rgba(30,40,50,0.5)"/>`;
      }
      // Search lights
      for(let i=0;i<6;i++){const sx=100+Math.random()*800;
        bg+=`<circle cx="${sx}" cy="${300+Math.random()*300}" r="15" fill="rgba(200,100,50,0.15)"><animate attributeName="cx" values="${sx};${sx+100-Math.random()*200};${sx}" dur="${3+Math.random()*3}s" repeatCount="indefinite"/></circle>`;
      }
      // Footstep indicators
      for(let i=0;i<8;i++) bg+=`<circle cx="${100+i*100}" cy="${700+Math.random()*100}" r="4" fill="rgba(200,100,50,0.3)"><animate attributeName="opacity" values="0;.5;0" dur="2s" begin="${i*0.3}s" repeatCount="indefinite"/></circle>`;
      // Cave interior fading
      bg+=`<rect x="0" y="0" width="${W}" height="${H}" fill="rgba(10,5,5,0.5)"/>`;
      bg+=particles(5,'rgba(200,100,50,0.3)',100,900,300,700);
      svg+=bg;
      svg+=hanLi(450,550,1.7,{angry:true});
      svg+=nangongWan(550,570,1.3);
      break;
    }
    case 19: { // New journey - overlooking mountains
      bg=`<defs><linearGradient id="g19" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a4a6a"/><stop offset="20%" stop-color="#4a7a9a"/><stop offset="40%" stop-color="#8ab4d0"/><stop offset="55%" stop-color="#c0d8e8"/><stop offset="70%" stop-color="#4a7a4a"/><stop offset="100%" stop-color="#1a3a1a"/></linearGradient></defs><rect width="${W}" height="${H}" fill="url(#g19)"/>`;
      bg+=clouds(5,30,200,'rgba(255,255,255,0.3)');
      // Vast mountain landscape
      bg+=`<path d="M0,${H} L0,${550} Q100,${400} 200,${480} Q350,${350} 500,${420} Q650,${300} 800,${450} Q900,${380} 1000,${500} L1000,${H}Z" fill="#3a6a3a" opacity=".4"/>`;
      bg+=`<path d="M0,${H} L0,${600} Q150,${500} 300,${550} Q450,${450} 600,${520} Q750,${480} 900,${560} L1000,${530} L1000,${H}Z" fill="#2a5a2a"/>`;
      // Southeast direction indicator
      bg+=`<path d="M700,500 L900,380" stroke="rgba(212,168,67,0.4)" stroke-width="2" stroke-dasharray="8,4"><animate attributeName="opacity" values=".3;.8;.3" dur="2s" repeatCount="indefinite"/></path>`;
      bg+=`<text x="880" y="370" fill="rgba(212,168,67,0.6)" font-size="14" font-family="SimSun">乱星海 →</text>`;
      // Wind effect
      for(let i=0;i<5;i++) bg+=`<line x1="${100+Math.random()*200}" y1="${300+Math.random()*200}" x2="${300+Math.random()*200}" y2="${250+Math.random()*150}" stroke="rgba(200,220,255,0.1)" stroke-width="1"><animate attributeName="x1" values="${100+Math.random()*200};-200" dur="${2+Math.random()*2}s" repeatCount="indefinite"/><animate attributeName="x2" values="${300+Math.random()*200};100" dur="${2+Math.random()*2}s" repeatCount="indefinite"/></line>`;
      // Cliff they stand on
      bg+=`<path d="M100,${H} L150,600 Q200,550 350,570 Q400,540 450,560 L500,620 L500,${H}Z" fill="#1a3a1a"/>`;
      bg+=particles(5,'rgba(255,255,255,0.2)',600,900,300,500);
      svg+=bg;
      svg+=hanLi(300,500,1.8,{hair:true});
      svg+=nangongWan(400,510,1.5);
      break;
    }
  }
  svg+=`</svg>`;
  return svg;
}

// === Navigation ===
epTitle.addEventListener('click',()=>{epTitle.style.opacity='0';setTimeout(()=>{epTitle.style.display='none';subBox.style.display='block';ctrls.style.display='flex';goTo(0)},2000)});
document.getElementById('btn-prev').addEventListener('click',()=>{if(cur>0)goTo(cur-1)});
document.getElementById('btn-next').addEventListener('click',()=>{if(cur<SCENES.length-1)goTo(cur+1)});
document.getElementById('btn-auto').addEventListener('click',toggleAuto);
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(cur<SCENES.length-1)goTo(cur+1)}if(e.key==='ArrowLeft'&&cur>0)goTo(cur-1)});

function toggleAuto(){auto=!auto;document.getElementById('btn-auto').textContent=auto?'⏸ 暂停':'▶ 自动播放';if(auto)schedAuto();else clearTimeout(aTimer)}
function schedAuto(){if(!auto)return;aTimer=setTimeout(()=>{if(cur<SCENES.length-1){goTo(cur+1);schedAuto()}else{auto=false;document.getElementById('btn-auto').textContent='▶ 自动播放'}},10000)}

function goTo(idx){
  clearTimeout(tTimer);
  document.querySelectorAll('.scene.active').forEach(e=>e.classList.remove('active'));
  let el=document.getElementById('sc-'+idx);
  if(!el){el=document.createElement('div');el.className='scene';el.id='sc-'+idx;el.innerHTML=drawScene(idx);stage.appendChild(el)}
  setTimeout(()=>el.classList.add('active'),50);
  cur=idx;
  scTitle.textContent=SCENES[idx].t;
  scInd.textContent=`${idx+1} / ${SCENES.length}`;
  typeText(SCENES[idx].s);
}

function typeText(text){
  subText.innerHTML='';let i=0;
  const c=document.createElement('span');c.className='cursor';
  function t(){if(i<text.length){subText.textContent=text.slice(0,i+1);subText.appendChild(c);i++;tTimer=setTimeout(t,45)}else{subText.textContent=text}}
  t();
}
</script>
