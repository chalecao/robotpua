<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>围棋 Go</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden}
h1{margin:18px 0 8px;font-size:1.6rem;letter-spacing:2px;color:#e8d5b7;text-shadow:0 0 20px rgba(232,213,183,.3)}
.controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.controls button,.controls select{background:#16213e;color:#e0e0e0;border:1px solid #0f3460;padding:7px 18px;border-radius:6px;cursor:pointer;font-size:.9rem;transition:all .2s}
.controls button:hover,.controls select:hover{background:#0f3460;border-color:#e94560}
.controls button.active{background:#e94560;border-color:#e94560}
.info-bar{display:flex;gap:30px;align-items:center;margin-bottom:10px;font-size:.95rem}
.turn-indicator{display:flex;align-items:center;gap:8px;font-weight:600}
.stone-icon{width:18px;height:18px;border-radius:50%;display:inline-block;border:1px solid #555}
.stone-icon.black{background:radial-gradient(circle at 35% 35%,#555,#000)}
.stone-icon.white{background:radial-gradient(circle at 35% 35%,#fff,#bbb)}
.captures{display:flex;gap:16px;font-size:.85rem;color:#aaa}
#board-container{position:relative;margin:10px auto}
canvas{display:block;border-radius:8px}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:10;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-content{background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:30px 40px;text-align:center;max-width:400px}
.modal-content h2{margin-bottom:16px;color:#e8d5b7}
.modal-content p{margin-bottom:20px;line-height:1.6}
.modal-content button{background:#e94560;color:#fff;border:none;padding:10px 28px;border-radius:6px;cursor:pointer;font-size:1rem;margin:4px}
.modal-content button:hover{background:#c73550}
.score-detail{font-size:.9rem;color:#aaa;margin-bottom:14px}
</style>
</head>
<body>
<h1>围 棋 Go</h1>
<div class="controls">
  <select id="board-size">
    <option value="9">9 × 9</option>
    <option value="13">13 × 13</option>
    <option value="19" selected>19 × 19</option>
  </select>
  <button id="btn-pass">Pass</button>
  <button id="btn-undo">Undo</button>
  <button id="btn-reset">New Game</button>
</div>
<div class="info-bar">
  <div class="turn-indicator"><span class="stone-icon black" id="turn-icon"></span><span id="turn-text">Black's turn</span></div>
  <div class="captures">
    <span>⚫ captured: <b id="cap-black">0</b></span>
    <span>⚪ captured: <b id="cap-white">0</b></span>
  </div>
</div>
<div id="board-container">
  <canvas id="board"></canvas>
  <canvas id="overlay"></canvas>
</div>
<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="modal-title">Game Over</h2>
    <p id="modal-body"></p>
    <div class="score-detail" id="modal-detail"></div>
    <button onclick="closeModal()">OK</button>
  </div>
</div>
<script>
(function(){
const EMPTY=0,BLACK=1,WHITE=2;
let N=19,board=[],history=[],currentPlayer=BLACK,captures={[BLACK]:0,[WHITE]:0},passCount=0,koPoint=null,gameOver=false;
const canvas=document.getElementById('board'),ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay'),oCtx=overlay.getContext('2d');
const container=document.getElementById('board-container');
let cellSize,padding,boardPixels;
const particles=[];
let animFrame;

function init(){
  board=Array.from({length:N},()=>Array(N).fill(EMPTY));
  history=[];currentPlayer=BLACK;captures={[BLACK]:0,[WHITE]:0};passCount=0;koPoint=null;gameOver=false;
  particles.length=0;
  calcSizes();
  updateUI();
  draw();
}

function calcSizes(){
  const maxW=Math.min(window.innerWidth-40,window.innerHeight-220,700);
  cellSize=Math.floor(maxW/(N+1));
  padding=cellSize;
  boardPixels=cellSize*(N-1)+padding*2;
  canvas.width=canvas.height=boardPixels;
  overlay.width=overlay.height=boardPixels;
  container.style.width=container.style.height=boardPixels+'px';
}

function toPixel(row,col){return{x:padding+col*cellSize,y:padding+row*cellSize}}
function toBoard(px,py){
  const col=Math.round((px-padding)/cellSize),row=Math.round((py-padding)/cellSize);
  if(row<0||row>=N||col<0||col>=N)return null;
  const p=toPixel(row,col);
  if(Math.hypot(px-p.x,py-p.y)>cellSize*0.45)return null;
  return{row,col};
}

function draw(){
  ctx.clearRect(0,0,boardPixels,boardPixels);
  drawBoard();
  drawStones();
}

function drawBoard(){
  const grad=ctx.createLinearGradient(0,0,boardPixels,boardPixels);
  grad.addColorStop(0,'#d4a843');grad.addColorStop(1,'#c49232');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.roundRect(0,0,boardPixels,boardPixels,8);ctx.fill();
  ctx.strokeStyle='#5a3e1b';ctx.lineWidth=1;
  for(let i=0;i<N;i++){
    const p0=toPixel(i,0),p1=toPixel(i,N-1);
    ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.stroke();
    const p2=toPixel(0,i),p3=toPixel(N-1,i);
    ctx.beginPath();ctx.moveTo(p2.x,p2.y);ctx.lineTo(p3.x,p3.y);ctx.stroke();
  }
  const stars=N<=9?[[2,2],[2,6],[6,2],[6,6],[4,4]]:
    N<=13?[[3,3],[3,9],[9,3],[9,9],[6,6],[3,6],[6,3],[6,9],[9,6]]:
    [[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]];
  ctx.fillStyle='#5a3e1b';
  for(const[r,c]of stars){
    if(r<N&&c<N){const p=toPixel(r,c);ctx.beginPath();ctx.arc(p.x,p.y,cellSize*0.12,0,Math.PI*2);ctx.fill();}
  }
}

function drawStones(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(board[r][c]===EMPTY)continue;
    drawStone(r,c,board[r][c]);
  }
}

function drawStone(row,col,color,alpha=1){
  const p=toPixel(row,col),rad=cellSize*0.44;
  ctx.globalAlpha=alpha;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=6;ctx.shadowOffsetX=2;ctx.shadowOffsetY=2;
  const g=ctx.createRadialGradient(p.x-rad*0.3,p.y-rad*0.3,rad*0.1,p.x,p.y,rad);
  if(color===BLACK){g.addColorStop(0,'#666');g.addColorStop(1,'#000');}
  else{g.addColorStop(0,'#fff');g.addColorStop(1,'#bbb');}
  ctx.fillStyle=g;
  ctx.beginPath();ctx.arc(p.x,p.y,rad,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.globalAlpha=1;
}

// --- Go Rules ---
function neighbors(r,c){
  const res=[];
  if(r>0)res.push([r-1,c]);if(r<N-1)res.push([r+1,c]);
  if(c>0)res.push([r,c-1]);if(c<N-1)res.push([r,c+1]);
  return res;
}

function getGroup(bd,r,c){
  const color=bd[r][c],visited=new Set(),stack=[[r,c]],group=[],liberties=new Set();
  while(stack.length){
    const[cr,cc]=stack.pop(),key=cr*N+cc;
    if(visited.has(key))continue;visited.add(key);
    if(bd[cr][cc]===color){group.push([cr,cc]);for(const[nr,nc]of neighbors(cr,cc)){const nk=nr*N+nc;if(!visited.has(nk)){if(bd[nr][nc]===EMPTY)liberties.add(nk);else stack.push([nr,nc]);}}}
  }
  return{group,liberties:liberties.size};
}

function cloneBoard(bd){return bd.map(r=>[...r])}

function tryMove(r,c){
  if(gameOver||board[r][c]!==EMPTY)return false;
  if(koPoint&&koPoint[0]===r&&koPoint[1]===c)return false;
  const nb=cloneBoard(board);
  nb[r][c]=currentPlayer;
  const opp=currentPlayer===BLACK?WHITE:BLACK;
  let captured=[];
  for(const[nr,nc]of neighbors(r,c)){
    if(nb[nr][nc]===opp){const g=getGroup(nb,nr,nc);if(g.liberties===0){for(const[gr,gc]of g.group){nb[gr][gc]=EMPTY;captured.push([gr,gc]);}}}
  }
  const self=getGroup(nb,r,c);
  if(self.liberties===0)return false;
  const newKo=captured.length===1&&self.group.length===1?captured[0]:null;
  history.push({board:cloneBoard(board),player:currentPlayer,captures:{...captures},koPoint,passCount});
  board=nb;
  captures[currentPlayer]+=captured.length;
  koPoint=newKo;
  if(captured.length>0){
    for(const[cr,cc]of captured)spawnCaptureEffect(cr,cc,currentPlayer===BLACK?WHITE:BLACK);
  }
  spawnPlaceEffect(r,c,currentPlayer);
  currentPlayer=opp;
  passCount=0;
  updateUI();draw();
  return true;
}

function pass(){
  if(gameOver)return;
  history.push({board:cloneBoard(board),player:currentPlayer,captures:{...captures},koPoint,passCount});
  passCount++;
  if(passCount>=2){endGame();return;}
  currentPlayer=currentPlayer===BLACK?WHITE:BLACK;
  koPoint=null;
  updateUI();
}

function undo(){
  if(history.length===0)return;
  const prev=history.pop();
  board=prev.board;currentPlayer=prev.player;captures=prev.captures;koPoint=prev.koPoint;passCount=prev.passCount;gameOver=false;
  particles.length=0;
  updateUI();draw();
}

function endGame(){
  gameOver=true;
  const score=calculateScore();
  const komi=6.5;
  const blackTotal=score.blackTerritory+captures[BLACK];
  const whiteTotal=score.whiteTerritory+captures[WHITE]+komi;
  const winner=blackTotal>whiteTotal?'Black ⚫':'White ⚪';
  const diff=Math.abs(blackTotal-whiteTotal);
  document.getElementById('modal-title').textContent='Game Over';
  document.getElementById('modal-body').textContent=`${winner} wins by ${diff} points!`;
  document.getElementById('modal-detail').textContent=`Black: ${score.blackTerritory} territory + ${captures[BLACK]} captures = ${blackTotal}\nWhite: ${score.whiteTerritory} territory + ${captures[WHITE]} captures + ${komi} komi = ${whiteTotal}`;
  document.getElementById('modal').classList.add('show');
}
window.closeModal=function(){document.getElementById('modal').classList.remove('show');};

function calculateScore(){
  const visited=Array.from({length:N},()=>Array(N).fill(false));
  let blackTerritory=0,whiteTerritory=0;
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(board[r][c]!==EMPTY||visited[r][c])continue;
    const region=[],border=new Set(),stack=[[r,c]];
    while(stack.length){
      const[cr,cc]=stack.pop();
      if(cr<0||cr>=N||cc<0||cc>=N||visited[cr][cc])continue;
      if(board[cr][cc]!==EMPTY){border.add(board[cr][cc]);continue;}
      visited[cr][cc]=true;region.push([cr,cc]);
      stack.push([cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]);
    }
    if(border.size===1){
      if(border.has(BLACK))blackTerritory+=region.length;
      else whiteTerritory+=region.length;
    }
  }
  return{blackTerritory,whiteTerritory};
}

function updateUI(){
  const icon=document.getElementById('turn-icon');
  icon.className='stone-icon '+(currentPlayer===BLACK?'black':'white');
  document.getElementById('turn-text').textContent=currentPlayer===BLACK?"Black's turn":"White's turn";
  document.getElementById('cap-black').textContent=captures[BLACK];
  document.getElementById('cap-white').textContent=captures[WHITE];
}

// --- Particle System ---
function spawnPlaceEffect(row,col,color){
  const p=toPixel(row,col);
  const hue=color===BLACK?220:45;
  for(let i=0;i<20;i++){
    const angle=Math.random()*Math.PI*2,speed=1+Math.random()*3;
    particles.push({x:p.x,y:p.y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,decay:0.02+Math.random()*0.02,size:2+Math.random()*3,color:`hsla(${hue},80%,65%,`,type:'place'});
  }
  for(let i=0;i<12;i++){
    const angle=Math.random()*Math.PI*2,dist=cellSize*0.4;
    particles.push({x:p.x+Math.cos(angle)*dist,y:p.y+Math.sin(angle)*dist,vx:Math.cos(angle)*0.5,vy:Math.sin(angle)*0.5,life:1,decay:0.015,size:1.5,color:`hsla(${hue},90%,75%,`,type:'spark',angle:angle,dist:dist,cx:p.x,cy:p.y,progress:0});
  }
  if(!animFrame)animate();
}

function spawnCaptureEffect(row,col,capturedColor){
  const p=toPixel(row,col);
  const hue=capturedColor===BLACK?0:50;
  for(let i=0;i<30;i++){
    const angle=Math.random()*Math.PI*2,speed=2+Math.random()*4;
    particles.push({x:p.x,y:p.y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,decay:0.015+Math.random()*0.01,size:2+Math.random()*4,color:`hsla(${hue},90%,60%,`,type:'capture'});
  }
  for(let i=0;i<8;i++){
    const angle=(Math.PI*2/8)*i;
    particles.push({x:p.x,y:p.y,vx:0,vy:0,life:1,decay:0.02,size:0,color:`hsla(${hue},100%,80%,`,type:'ring',angle,radius:0,expandSpeed:2+Math.random()});
  }
  if(!animFrame)animate();
}

function animate(){
  oCtx.clearRect(0,0,boardPixels,boardPixels);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue;}
    oCtx.globalAlpha=p.life;
    if(p.type==='place'||p.type==='capture'){
      p.x+=p.vx;p.y+=p.vy;p.vx*=0.96;p.vy*=0.96;
      oCtx.fillStyle=p.color+p.life+')';
      oCtx.beginPath();oCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);oCtx.fill();
    }else if(p.type==='spark'){
      p.progress+=0.04;
      const a=p.angle+p.progress*2,d=p.dist*(1-p.life*0.5);
      p.x=p.cx+Math.cos(a)*d;p.y=p.cy+Math.sin(a)*d;
      oCtx.fillStyle=p.color+p.life+')';
      oCtx.beginPath();oCtx.arc(p.x,p.y,p.size,0,Math.PI*2);oCtx.fill();
    }else if(p.type==='ring'){
      p.radius+=p.expandSpeed;
      oCtx.strokeStyle=p.color+p.life*0.6+')';
      oCtx.lineWidth=2*p.life;
      oCtx.beginPath();oCtx.arc(p.x,p.y,p.radius,0,Math.PI*2);oCtx.stroke();
    }
  }
  oCtx.globalAlpha=1;
  if(particles.length>0)animFrame=requestAnimationFrame(animate);
  else animFrame=null;
}

// --- Events ---
canvas.addEventListener('click',function(e){
  if(gameOver)return;
  const rect=canvas.getBoundingClientRect();
  const px=(e.clientX-rect.left)*(boardPixels/rect.width);
  const py=(e.clientY-rect.top)*(boardPixels/rect.height);
  const pos=toBoard(px,py);
  if(pos)tryMove(pos.row,pos.col);
});

let hoverPos=null;
canvas.addEventListener('mousemove',function(e){
  const rect=canvas.getBoundingClientRect();
  const px=(e.clientX-rect.left)*(boardPixels/rect.width);
  const py=(e.clientY-rect.top)*(boardPixels/rect.height);
  const pos=toBoard(px,py);
  if(!pos){if(hoverPos){hoverPos=null;draw();}return;}
  if(!hoverPos||hoverPos.row!==pos.row||hoverPos.col!==pos.col){
    hoverPos=pos;draw();
    if(board[pos.row][pos.col]===EMPTY){
      drawStone(pos.row,pos.col,currentPlayer,0.35);
    }
  }
});
canvas.addEventListener('mouseleave',function(){hoverPos=null;draw();});

document.getElementById('btn-pass').addEventListener('click',pass);
document.getElementById('btn-undo').addEventListener('click',undo);
document.getElementById('btn-reset').addEventListener('click',function(){init();});
document.getElementById('board-size').addEventListener('change',function(){
  N=parseInt(this.value);init();
});

window.addEventListener('resize',function(){calcSizes();draw();});

init();
})();
</script>
</body>
</html>
