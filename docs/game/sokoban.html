<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>推箱子 Sokoban</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
#hdr{display:flex;align-items:center;gap:8px;padding:8px 14px;background:linear-gradient(180deg,#151b2e,#111827);border-bottom:1px solid #1e293b;flex-wrap:wrap;z-index:2}
#hdr h1{font-size:16px;margin-right:auto;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.5px}
.b{background:#1e293b;color:#cbd5e1;border:1px solid #334155;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .15s;font-family:inherit}
.b:hover{background:#334155;border-color:#475569;color:#f1f5f9}
.b:active{transform:scale(.96)}
.bp{background:#2563eb;border-color:#3b82f6;color:#fff}.bp:hover{background:#1d4ed8}
.bg{background:#16a34a;border-color:#22c55e;color:#fff}.bg:hover{background:#15803d}
#info{display:flex;gap:16px;padding:5px 14px;font-size:12px;background:#111827;color:#64748b;border-bottom:1px solid #1e293b40}
#info span{display:flex;align-items:center;gap:4px}
#info b{color:#e2e8f0;font-weight:600;font-variant-numeric:tabular-nums}
#cw{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%;touch-action:none}
#turn{position:absolute;top:12px;left:50%;transform:translateX(-50%);padding:5px 18px;border-radius:20px;font-size:13px;font-weight:600;pointer-events:none;transition:all .3s;opacity:0;backdrop-filter:blur(8px)}
#turn.s{opacity:1}
.t1{background:#22c55e20;border:1px solid #22c55e60;color:#4ade80}
.t2{background:#3b82f620;border:1px solid #3b82f660;color:#60a5fa}
.ov{position:absolute;inset:0;background:#0a0e1af0;display:flex;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(4px)}
.ov.h{display:none}
.mb{background:linear-gradient(180deg,#1e293b,#151b2e);border:1px solid #334155;border-radius:16px;padding:28px;max-width:420px;width:92%;text-align:center;box-shadow:0 25px 50px -12px #00000080}
.mb h2{font-size:22px;margin-bottom:8px;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mb p{color:#94a3b8;margin-bottom:16px;font-size:13px;line-height:1.7}
.lg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:16px 0}
.lb{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1e293b;border:2px solid #334155;border-radius:10px;cursor:pointer;font-size:18px;font-weight:700;transition:all .2s;color:#e2e8f0}
.lb:hover{border-color:#fbbf24;transform:scale(1.08);box-shadow:0 0 16px #fbbf2430}
.lb.dn{background:#16a34a18;border-color:#22c55e50;color:#4ade80}
.lb small{font-size:9px;color:#64748b;margin-top:2px;font-weight:400}
.lb.dn small{color:#22c55e80}
.mr{display:flex;gap:8px;justify-content:center;margin:16px 0}
.mr .b{padding:8px 20px;font-size:13px}
#dp{position:absolute;bottom:20px;right:20px;display:none;grid-template-areas:". u ." "l . r" ". d .";gap:4px;z-index:5}
.db{width:50px;height:50px;background:#1e293b80;border:1px solid #33415580;border-radius:12px;color:#e2e8f0;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px);transition:background .1s}
.db:active{background:#33415580}
@media(pointer:coarse){#dp{display:grid}}
.kh{font-size:11px;color:#475569;margin-top:12px}
.kh kbd{background:#1e293b;padding:2px 6px;border-radius:4px;font-family:inherit;border:1px solid #334155;color:#94a3b8}
.stars{color:#fbbf24;font-size:14px;letter-spacing:2px;margin-top:4px}

/***** 移动端安全补丁 v2（不破坏原布局） *****/
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  min-height:100vh;
  overflow-x:hidden;
  -webkit-text-size-adjust:100%;
  padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));
}
button,.btn,[onclick],.cell,.tile,.square,.board-cell{cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none}
canvas{max-width:100vw;display:block}

@media (max-width:768px){
  h1{font-size:clamp(1.2rem,6vw,1.8rem)!important;margin:8px 0!important;letter-spacing:1px!important}
  h2{font-size:clamp(1rem,5vw,1.3rem)!important}
  h3{font-size:clamp(.9rem,4.5vw,1.1rem)!important}
  p{font-size:clamp(.85rem,3.5vw,1rem)!important}
  .btn,.button{padding:12px 20px!important;font-size:1rem!important;min-height:44px;border-radius:10px!important}
  .btn-sm{font-size:.9rem!important;padding:8px 14px!important}
  input,select,textarea{font-size:16px!important;padding:10px!important;max-width:100%}
  .modal,.popup,.dialog{max-width:92vw!important;padding:16px!important;margin:8px!important}
  .score,.badge,.tag{font-size:.85rem!important;padding:4px 10px!important}
  [style*="width:120"],[style*="width: 120"]{width:clamp(40px,12vw,72px)!important;height:clamp(40px,12vw,72px)!important;font-size:clamp(1.5rem,6vw,2.5rem)!important}
  [style*="width:100"],[style*="width: 100"]{width:clamp(40px,11vw,80px)!important;height:clamp(40px,11vw,80px)!important;font-size:clamp(1.4rem,5.5vw,2.2rem)!important}
  [style*="width:80"],[style*="width: 80"]{width:clamp(36px,10vw,70px)!important;height:clamp(36px,10vw,70px)!important}
  [style*="width:60"],[style*="width: 60"]{width:clamp(32px,9vw,60px)!important;height:clamp(32px,9vw,60px)!important}
  [style*="width:50"],[style*="width: 50"]{width:clamp(28px,8vw,50px)!important;height:clamp(28px,8vw,50px)!important}
  [style*="width:40"],[style*="width: 40"]{width:clamp(24px,7vw,40px)!important;height:clamp(24px,7vw,40px)!important}
  [style*="width:30"],[style*="width: 30"]{width:clamp(20px,6vw,30px)!important;height:clamp(20px,6vw,30px)!important}
  [style*="width:480"],[style*="width: 480"]{width:min(90vw,420px)!important}
  [style*="width:600"],[style*="width: 600"]{width:min(92vw,500px)!important}
  [style*="width:800"],[style*="width: 800"]{width:min(94vw,600px)!important}
  [style*="width:1000"],[style*="width: 1000"]{width:min(96vw,700px)!important}
  [style*="height:480"],[style*="height: 480"]{height:auto!important;aspect-ratio:1!important}
  [style*="height:600"],[style*="height: 600"]{height:auto!important;aspect-ratio:1!important}
  [style*="height:800"],[style*="height: 800"]{height:auto!important;aspect-ratio:1!important}
}
@media (max-width:480px){
  body{padding:6px!important}
  h1{font-size:1.15rem!important}
}
@media (hover:none) and (pointer:coarse){
  *:hover{transform:none!important}
}
/***** 移动端全屏游戏画布 *****/
@media (hover:none) and (pointer:coarse){
  html,body{
    height:100%!important;width:100%!important;
    overflow:hidden!important;
    padding:0!important;
    margin:0!important;
    background:#000;
  }
  #gameContainer,body>div:first-child,body>.wrap{
    position:fixed!important;inset:0!important;
    display:flex!important;align-items:center!important;justify-content:center!important;
    width:100vw!important;height:100vh!important;
    background:#000;
  }
  canvas{
    width:100vw!important;height:100vh!important;
    max-width:100vw!important;max-height:100vh!important;
    object-fit:contain;
    touch-action:none;
  }
  #overlay,#menu,#gameOver,.modal{
    position:fixed!important;inset:0!important;
    z-index:100!important;
    padding:20px!important;
  }
  /* 主页"← 主页"按钮缩小 */
  a[href="../index.html"]{font-size:11px!important;padding:6px 10px!important}
}
</style>
</head>
<body>
<div id="hdr">
<h1>SOKOBAN</h1>
<button class="b" id="bLv">选关</button>
<button class="b" id="bRs">重来</button>
<button class="b" id="bUn">撤销</button>
<button class="b bp" id="bMd">单人</button>
</div>
<div id="info">
<span>关卡 <b id="iLv">1</b>/10</span>
<span>步数 <b id="iMv">0</b></span>
<span>推动 <b id="iPsh">0</b></span>
<span>时间 <b id="iTm">00:00</b></span>
</div>
<div id="cw">
<canvas id="c"></canvas>
<div id="turn"></div>
<div class="ov" id="ovL">
<div class="mb">
<h2>SOKOBAN</h2>
<p>在迷宫中推动箱子到目标点上<br>只能推不能拉，需要巧妙的策略规划</p>
<div class="mr">
<button class="b bp" id="m1">单人模式</button>
<button class="b bg" id="m2">双人合作</button>
</div>
<button class="b bp" style="width:100%;padding:10px" id="go">开始游戏</button>
<div class="kh"><kbd>WASD</kbd> / <kbd>方向键</kbd> 移动 · <kbd>Z</kbd> 撤销 · <kbd>R</kbd> 重来</div>
</div>
</div>
<div class="ov h" id="ovW">
<div class="mb">
<h2 id="wT">过关!</h2>
<p id="wS"></p>
<div class="stars" id="wSt"></div>
<div class="mr">
<button class="b" id="wR">重来</button>
<button class="b bp" id="wN">下一关</button>
</div>
</div>
</div>
</div>
<div id="dp">
<div></div>
<button class="db" data-d="0,-1">↑</button>
<div></div>
<button class="db" data-d="-1,0">←</button>
<div></div>
<button class="db" data-d="1,0">→</button>
<div></div>
<button class="db" data-d="0,1">↓</button>
<div></div>
</div>
<script>
(function(){
const LV=[
{n:"初识",d:"推动箱子到目标点",p:[20,30],r:[
"######",
"#    #",
"# .  #",
"#  $ #",
"# @  #",
"######"]},
{n:"双推",d:"两个箱子入门",p:[40,60],r:[
"#######",
"#     #",
"# .$  #",
"#  .@ #",
"#   $ #",
"#     #",
"#######"]},
{n:"换位",d:"需要迂回策略",p:[60,100],r:[
"#######",
"#     #",
"# . $ #",
"#  #  #",
"# $ . #",
"#  @  #",
"#######"]},
{n:"三箱",d:"三个箱子的配合",p:[80,140],r:[
"#######",
"#     #",
"# .$. #",
"#  $$ #",
"# . @ #",
"#     #",
"#######"]},
{n:"纵推",d:"三箱纵向推进",p:[60,100],r:[
"#######",
"# ... #",
"#     #",
"#     #",
"# $$$ #",
"#     #",
"#  @  #",
"#######"]},
{n:"横排",d:"整齐排列",p:[80,130],r:[
"#######",
"# ... #",
"#     #",
"# $$$ #",
"#     #",
"#  @  #",
"#######"]},
{n:"交错",d:"四个箱子交错推进",p:[100,180],r:[
"########",
"#      #",
"# $$ . #",
"#   .  #",
"#  .   #",
"# . $$ #",
"#   @  #",
"########"]},
{n:"四方",d:"四箱归位",p:[120,220],r:[
"#########",
"# .. . .#",
"#       #",
"#       #",
"#  $  $ #",
"#       #",
"# $   $ #",
"#   @   #",
"#########"]},
{n:"深谋",d:"四箱深谋远虑",p:[100,180],r:[
"#######",
"# . . #",
"# . . #",
"#     #",
"# $$$$#",
"#     #",
"#  @  #",
"#######"]},
{n:"大师",d:"终极挑战",p:[100,180],r:[
"########",
"# .....#",
"#      #",
"#      #",
"# $$$$$#",
"#      #",
"#      #",
"#  @   #",
"########"]}
];
const CL={bg:'#0a0e1a',wall:'#1e293b',wallH:'#334155',wallD:'#0f172a',
fl:'#111827',flH:'#1a2035',
tg:'#fbbf24',tg2:'#f59e0b',tgG:'#fbbf2440',
bx:'#92400e',bxH:'#b45309',bxG:'#166534',bxGH:'#22c55e',
p1:'#22c55e',p1l:'#4ade80',p2:'#3b82f6',p2l:'#60a5fa'};
let md='single',cl=0,done=new Set(),best={},
grid=[],gW,gH,tgts=[],pls=[],bxs=[],
hist=[],mvs=0,psh=0,t0=null,over=false,af=0,
parts=[],floats=[],cW,cH,tS,oX,oY,
aId=null,aS=0,aD=140,aPl=-1,aBx=-1,aPD=null,aBP=null,
trailParts=[];
const cv=document.getElementById('c'),cx=cv.getContext('2d'),
cw=document.getElementById('cw'),
$=id=>document.getElementById(id),
iLv=$('iLv'),iMv=$('iMv'),iPsh=$('iPsh'),iTm=$('iTm'),
turn=$('turn'),ovL=$('ovL'),ovW=$('ovW'),wT=$('wT'),wS=$('wS'),wSt=$('wSt');
const AC=new (window.AudioContext||window.webkitAudioContext)();
function snd(f,d,t,v){if(AC.state==='suspended')AC.resume();
const o=AC.createOscillator(),g=AC.createGain();
o.type=t||'sine';o.frequency.value=f;g.gain.value=v||.06;
g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d)}
function sndMv(){snd(280,.08,'square',.03)}
function sndPush(){snd(180,.12,'triangle',.05)}
function sndGoal(){snd(523,.15,'sine',.08);setTimeout(()=>snd(659,.15,'sine',.08),80);setTimeout(()=>snd(784,.2,'sine',.08),160)}
function sndWin(){const ns=[523,587,659,784,880,1047];ns.forEach((f,i)=>setTimeout(()=>snd(f,.25,'sine',.07),i*100))}
function sndUndo(){snd(200,.08,'sawtooth',.03)}
function rsz(){const r=cw.getBoundingClientRect(),dp=devicePixelRatio||1;
cv.width=r.width*dp;cv.height=r.height*dp;
cv.style.width=r.width+'px';cv.style.height=r.height+'px';
cx.setTransform(dp,0,0,dp,0,0);cW=r.width;cH=r.height;calcCam()}
function calcCam(){if(!gW)return;const mw=cW*.92,mh=cH*.86;
tS=Math.min(mw/gW,mh/gH,68);tS=Math.max(tS,24);
oX=(cW-gW*tS)/2;oY=(cH-gH*tS)/2}
function loadLv(i){cl=i;const lv=LV[i];grid=[];tgts=[];pls=[];bxs=[];gH=lv.r.length;gW=0;
for(let y=0;y<gH;y++){grid[y]=[];gW=Math.max(gW,lv.r[y].length);
for(let x=0;x<lv.r[y].length;x++){const c=lv.r[y][x];
if(c==='#')grid[y][x]=1;
else if(c==='.'){grid[y][x]=0;tgts.push({x,y})}
else if(c==='$'){grid[y][x]=0;bxs.push({x,y})}
else if(c==='*'){grid[y][x]=0;tgts.push({x,y});bxs.push({x,y})}
else if(c==='@'){grid[y][x]=0;pls.push({x,y,id:0})}
else if(c==='+'){grid[y][x]=0;tgts.push({x,y});pls.push({x,y,id:0})}
else grid[y][x]=0}}
for(let y=0;y<gH;y++)while(grid[y].length<gW)grid[y].push(0)
if(md==='dual'&&pls.length>=1){let bp=null,md2=0;
for(let y=0;y<gH;y++)for(let x=0;x<gW;x++){if(grid[y][x]===0&&!bxs.some(b=>b.x===x&&b.y===y)&&!pls.some(p=>p.x===x&&p.y===y)){
const d=Math.abs(x-pls[0].x)+Math.abs(y-pls[0].y);
if(d>=3&&d>md2){md2=d;bp={x,y}}}}
if(bp)pls.push({x:bp.x,y:bp.y,id:1})}
hist=[];mvs=0;psh=0;t0=Date.now();over=false;
parts=[];floats=[];trailParts=[];aId=null;af=pls.length>1?0:0;
iLv.textContent=i+1;ui();calcCam();
ovL.classList.add('h');ovW.classList.add('h');
addF(cW/2,cH/2-30,`第${i+1}关: ${lv.n}`,'#fbbf24',24,2000);
addF(cW/2,cH/2+10,lv.d,'#94a3b8',14,2000)}
function ui(){iMv.textContent=mvs;iPsh.textContent=psh;
if(md==='dual'&&pls.length>=2&&!over){turn.textContent=`玩家 ${af+1} 的回合`;
turn.className='s '+(af===0?'t1':'t2')}else turn.className=''}
function tmr(){if(!t0||over)return;const s=Math.floor((Date.now()-t0)/1000),
m=Math.floor(s/60),ss=s%60;iTm.textContent=String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0')}
setInterval(tmr,500);
function save(){hist.push({p:pls.map(p=>({x:p.x,y:p.y})),b:bxs.map(b=>({x:b.x,y:b.y})),
a:af,m:mvs,s:psh});if(hist.length>500)hist.shift()}
function undo(){if(!hist.length||aId||over)return;const h=hist.pop();
pls=h.p;bxs=h.b;af=h.a;mvs=h.m;psh=h.s;sndUndo();ui()}
function walk(x,y){return x>=0&&x<gW&&y>=0&&y<gH&&grid[y][x]===0}
function bxAt(x,y){return bxs.findIndex(b=>b.x===x&&b.y===y)}
function plAt(x,y){return pls.findIndex(p=>p.x===x&&p.y===y)}
function blocked(x,y){return!walk(x,y)||bxAt(x,y)>=0||plAt(x,y)>=0}
function tryMv(pi,dx,dy){if(over||aId)return;
if(md==='dual'&&pi!==af)return;
const p=pls[pi],nx=p.x+dx,ny=p.y+dy;
if(!walk(nx,ny))return;
const bi=bxAt(nx,ny);
if(bi>=0){const bnx=bxs[bi].x+dx,bny=bxs[bi].y+dy;
if(blocked(bnx,bny))return;
save();bxs[bi].x=bnx;bxs[bi].y=bny;psh++;mvs++;
const px=oX+nx*tS+tS/2,py=oY+ny*tS+tS/2;
emitPush(px,py,pi);sndPush();
if(tgts.some(t=>t.x===bnx&&t.y===bny)){
const gx=oX+bnx*tS+tS/2,gy=oY+bny*tS+tS/2;
emitGoal(gx,gy);sndGoal();
addF(gx,gy-tS*.6,'+目标','#fbbf24',14,1200)}
aBx=bi;aBP={x:nx-dx,y:ny-dy};aPD={x:dx,y:dy};
}else{save();mvs++;sndMv();
const px=oX+p.x*tS+tS/2,py=oY+p.y*tS+tS/2;
emitTrail(px,py,pi)}
p.x=nx;p.y=ny;af=1-af;ui();
aId='mv';aS=performance.now();aPl=pi;aPD={x:dx,y:dy};
if(bi<0){aBx=-1;aBP=null}}
function chkWin(){if(bxs.length!==tgts.length)return false;
return tgts.every(t=>bxs.some(b=>b.x===t.x&&b.y===t.y))}
function calcStars(lvIdx,moves,pushes){
const par=LV[lvIdx].p;
if(!par)return 3;
const score=moves+pushes;
if(score<=par[0])return 3;
if(score<=par[1])return 2;
return 1}
function onWin(){over=true;done.add(cl);
const el=Math.floor((Date.now()-t0)/1000);
const stars=calcStars(cl,mvs,psh);
const prevBest=best[cl];
if(!prevBest||stars>prevBest.stars||(stars===prevBest.stars&&mvs<prevBest.mvs)){
best[cl]={stars,mvs,psh,time:el}}
sndWin();
for(let w=0;w<5;w++){setTimeout(()=>{
const fx=cW*.2+Math.random()*cW*.6,fy=cH*.2+Math.random()*cH*.3;
emitFirework(fx,fy)},w*200)}
addF(cW/2,cH/2-40,'恭喜过关!','#fbbf24',28,3000);
wT.textContent=`第${cl+1}关 过关!`;
let st=`步数: ${mvs} · 推动: ${psh} · 时间: ${iTm.textContent}`;
if(md==='dual'){const m1=hist.filter((_,i)=>i%2===0).length,m2=hist.filter((_,i)=>i%2===1).length;
st+=`\n玩家1: ${m1}步 · 玩家2: ${m2}步`}
wS.textContent=st;
wSt.textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
setTimeout(()=>ovW.classList.remove('h'),2000)}
function emitPush(x,y,pi){const c=pi===0?CL.p1:CL.p2;
for(let i=0;i<14;i++){const a=Math.random()*Math.PI*2,s=Math.random()*2+.8;
parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,c,sz:Math.random()*3+1,l:1,dc:.02+Math.random()*.015,g:.05})}}
function emitTrail(x,y,pi){const c=pi===0?CL.p1:CL.p2;
for(let i=0;i<4;i++){parts.push({x:x+(Math.random()-.5)*6,y:y+(Math.random()-.5)*6,
vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,c,sz:Math.random()*2+.5,l:.7,dc:.025,g:0})}}
function emitGoal(x,y){
for(let i=0;i<40;i++){const a=Math.random()*Math.PI*2,s=Math.random()*4+1;
parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
c:Math.random()>.5?CL.tg:CL.tg2,sz:Math.random()*4+1.5,l:1,dc:.01+Math.random()*.01,g:.03})}
for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,s=Math.random()*2.5+.5;
parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,c:CL.bxGH,sz:Math.random()*3+1,l:1,dc:.012+Math.random()*.01,g:.04})}}
function emitFirework(x,y){
const cs=['#22c55e','#3b82f6','#fbbf24','#ef4444','#a855f7','#ec4899','#f97316','#06b6d4'];
const c=cs[Math.floor(Math.random()*cs.length)];
for(let i=0;i<35;i++){const a=Math.random()*Math.PI*2,s=Math.random()*6+2;
parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,c,sz:Math.random()*4+1.5,l:1,dc:.008+Math.random()*.008,g:.12})}}
function addF(x,y,t,c,s,dur){floats.push({x,y,t,c,s,tm:0,dur:dur||1500})}
function updParts(dt){const sc=dt/16;
for(let i=parts.length-1;i>=0;i--){const p=parts[i];
p.x+=p.vx*sc;p.y+=p.vy*sc;p.vy+=(p.g||.05)*sc;p.l-=p.dc*sc;
if(p.l<=0)parts.splice(i,1)}
for(let i=floats.length-1;i>=0;i--){const f=floats[i];f.tm+=dt;f.y-=.35*sc;
if(f.tm>=f.dur)floats.splice(i,1)}}
function drawWall(x,y){const px=oX+x*tS,py=oY+y*tS,s=tS;
const isTop=y===0||grid[y-1]?.[x]!==1;
const isLeft=x===0||grid[y]?.[x-1]!==1;
cx.fillStyle=CL.wall;cx.fillRect(px,py,s,s);
if(isTop){cx.fillStyle=CL.wallH;cx.fillRect(px,py,s,2)}
if(isLeft){cx.fillStyle=CL.wallH;cx.fillRect(px,py,2,s)}
cx.fillStyle=CL.wallD;cx.fillRect(px,py+s-1,s,1);cx.fillRect(px+s-1,py,1,s);
cx.fillStyle=CL.wallH+'20';
cx.fillRect(px+3,py+3,s-6,s-6)}
function drawFloor(x,y){const px=oX+x*tS,py=oY+y*tS;
cx.fillStyle=CL.fl;cx.fillRect(px,py,tS,tS);
cx.strokeStyle=CL.flH;cx.lineWidth=.5;cx.strokeRect(px+.5,py+.5,tS-1,tS-1)}
function drawTgt(t){const px=oX+t.x*tS+tS/2,py=oY+t.y*tS+tS/2,
r=tS*.16,pu=1+Math.sin(Date.now()*.003+t.x+t.y)*.2;
cx.save();cx.shadowColor=CL.tg;cx.shadowBlur=12*pu;
cx.fillStyle=CL.tg;cx.beginPath();cx.arc(px,py,r*pu,0,Math.PI*2);cx.fill();
cx.restore();
cx.strokeStyle=CL.tg2+'80';cx.lineWidth=1.5;
cx.beginPath();cx.arc(px,py,r*2.2,0,Math.PI*2);cx.stroke();
const hasBox=bxs.some(b=>b.x===t.x&&b.y===t.y);
if(!hasBox){cx.strokeStyle=CL.tg+'30';cx.lineWidth=1;cx.setLineDash([3,3]);
cx.beginPath();cx.arc(px,py,r*3,0,Math.PI*2);cx.stroke();cx.setLineDash([])}}
function drawBx(b,i){let bx=b.x,by=b.y;
if(aId==='mv'&&aBx===i&&aBP){const t=easeOut(Math.min(1,(performance.now()-aS)/aD));
bx=aBP.x+aPD.x*t;by=aBP.y+aPD.y*t}
const px=oX+bx*tS,py=oY+by*tS,s=tS,pd=s*.12,
onT=tgts.some(t=>t.x===b.x&&t.y===b.y),
c1=onT?CL.bxG:CL.bx,cH=onT?CL.bxGH:CL.bxH;
cx.save();
if(onT){cx.shadowColor=CL.bxGH;cx.shadowBlur=16}
cx.fillStyle=c1;
roundRect(cx,px+pd,py+pd,s-pd*2,s-pd*2,s*.08);cx.fill();
cx.restore();
cx.strokeStyle=cH;cx.lineWidth=1.5;
roundRect(cx,px+pd,py+pd,s-pd*2,s-pd*2,s*.08);cx.stroke();
cx.strokeStyle=cH+'60';cx.lineWidth=1;
const m=s*.25;
cx.beginPath();cx.moveTo(px+pd+m,py+pd+m);cx.lineTo(px+s-pd-m,py+s-pd-m);
cx.moveTo(px+s-pd-m,py+pd+m);cx.lineTo(px+pd+m,py+s-pd-m);cx.stroke();
if(onT){cx.fillStyle=CL.bxGH+'40';
roundRect(cx,px+pd,py+pd,s-pd*2,s-pd*2,s*.08);cx.fill()}}
function drawPl(p,i){let px=p.x,py=p.y;
if(aId==='mv'&&aPl===i){const t=easeOut(Math.min(1,(performance.now()-aS)/aD));
px=p.x-aPD.x*(1-t);py=p.y-aPD.y*(1-t)}
const sx=oX+px*tS+tS/2,sy=oY+py*tS+tS/2,r=tS*.34,
c=i===0?CL.p1:CL.p2,cl2=i===0?CL.p1l:CL.p2l;
const active=(i===0&&md==='single')||(md==='dual'&&i===af&&!over);
if(active){cx.save();cx.shadowColor=c;cx.shadowBlur=18;
const pulse=1+Math.sin(Date.now()*.005)*.12;
cx.fillStyle=c+'25';cx.beginPath();cx.arc(sx,sy,r*1.4*pulse,0,Math.PI*2);cx.fill();cx.restore()}
cx.save();cx.shadowColor=c;cx.shadowBlur=active?10:4;
cx.fillStyle=c;cx.beginPath();cx.arc(sx,sy,r,0,Math.PI*2);cx.fill();cx.restore();
cx.fillStyle=cl2;cx.beginPath();cx.arc(sx-r*.2,sy-r*.25,r*.35,0,Math.PI*2);cx.fill();
cx.fillStyle='#fff';cx.beginPath();cx.arc(sx+r*.15,sy-r*.1,r*.15,0,Math.PI*2);cx.fill();
cx.fillStyle='#0f172a';cx.beginPath();cx.arc(sx+r*.2,sy-r*.06,r*.08,0,Math.PI*2);cx.fill();
if(md==='dual'){cx.fillStyle='#fff';cx.font=`bold ${r*.7}px sans-serif`;
cx.textAlign='center';cx.textBaseline='middle';cx.fillText('P'+(i+1),sx,sy+r*.35)}}
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);
c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);
c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);
c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);
c.quadraticCurveTo(x,y,x+r,y);c.closePath()}
function render(ts){const dt=Math.min(ts-(render.lt||ts),50);render.lt=ts;
if(aId){if(performance.now()-aS>=aD){aId=null;if(chkWin())onWin()}}
updParts(dt);
cx.fillStyle=CL.bg;cx.fillRect(0,0,cW,cH);
for(let y=0;y<gH;y++)for(let x=0;x<gW;x++){if(grid[y][x]===1)drawWall(x,y);else drawFloor(x,y)}
tgts.forEach(drawTgt);bxs.forEach(drawBx);pls.forEach(drawPl);
for(const p of parts){cx.globalAlpha=Math.max(0,p.l);cx.fillStyle=p.c;
cx.beginPath();cx.arc(p.x,p.y,p.sz,0,Math.PI*2);cx.fill()}
cx.globalAlpha=1;
for(const f of floats){const a=1-f.tm/f.dur;cx.globalAlpha=Math.max(0,a);
cx.fillStyle=f.c;cx.font=`bold ${f.s}px sans-serif`;cx.textAlign='center';
cx.textBaseline='middle';cx.fillText(f.t,f.x,f.y)}
cx.globalAlpha=1;requestAnimationFrame(render)}
function easeOut(t){return 1-Math.pow(1-t,3)}
document.addEventListener('keydown',e=>{
const k=e.key.toLowerCase();
if(k==='arrowup'||k==='w'){e.preventDefault();tryMv(af,0,-1)}
else if(k==='arrowdown'||k==='s'){e.preventDefault();tryMv(af,0,1)}
else if(k==='arrowleft'||k==='a'){e.preventDefault();tryMv(af,-1,0)}
else if(k==='arrowright'||k==='d'){e.preventDefault();tryMv(af,1,0)}
else if(k==='z'){e.preventDefault();undo()}
else if(k==='r'){e.preventDefault();loadLv(cl)}
else if(k==='escape'){if(!ovL.classList.contains('h'))return;showLvls()}});
document.querySelectorAll('.db').forEach(b=>{b.addEventListener('click',()=>{
const[dx,dy]=b.dataset.d.split(',').map(Number);tryMv(af,dx,dy)})});
let ts=null;cv.addEventListener('touchstart',e=>{ts={x:e.touches[0].clientX,y:e.touches[0].clientY}},{passive:true});
cv.addEventListener('touchend',e=>{if(!ts)return;const dx=e.changedTouches[0].clientX-ts.x,
dy=e.changedTouches[0].clientY-ts.y;ts=null;
if(Math.max(Math.abs(dx),Math.abs(dy))<25)return;
if(Math.abs(dx)>Math.abs(dy))tryMv(af,dx>0?1:-1,0);else tryMv(af,0,dy>0?1:-1)},{passive:true});
function showLvls(){const mb=ovL.querySelector('.mb');
mb.innerHTML='<h2>选择关卡</h2><div class="lg" id="lgr"></div>'+
'<button class="b" id="bk">返回</button>';
const g=document.getElementById('lgr');
LV.forEach((l,i)=>{const d=document.createElement('div');d.className='lb'+(done.has(i)?' dn':'');
const st=best[i]?.stars||0;
d.innerHTML=`${i+1}<small>${l.n}</small>${done.has(i)?`<small class="stars">${'★'.repeat(st)}${'☆'.repeat(3-st)}</small>`:''}`;
d.onclick=()=>{rebuildMenu();loadLv(i)};g.appendChild(d)});
document.getElementById('bk').onclick=()=>{rebuildMenu();ovL.classList.add('h')};
ovL.classList.remove('h')}
function rebuildMenu(){const mb=ovL.querySelector('.mb');
mb.innerHTML='<h2>SOKOBAN</h2><p>在迷宫中推动箱子到目标点上<br>只能推不能拉，需要巧妙的策略规划</p>'+
'<div class="mr"><button class="b '+(md==='single'?'bp':'')+'" id="m1">单人模式</button>'+
'<button class="b '+(md==='dual'?'bg':'')+'" id="m2">双人合作</button></div>'+
'<button class="b bp" style="width:100%;padding:10px" id="go">开始游戏</button>'+
'<div class="kh"><kbd>WASD</kbd> / <kbd>方向键</kbd> 移动 · <kbd>Z</kbd> 撤销 · <kbd>R</kbd> 重来</div>';
bindMenu()}
function bindMenu(){$('m1').onclick=()=>{md='single';$('m1').className='b bp';$('m2').className='b bg';$('bMd').textContent='单人'};
$('m2').onclick=()=>{md='dual';$('m2').className='b bg';$('m1').className='b';$('bMd').textContent='双人'};
$('go').onclick=()=>{ovL.classList.add('h');loadLv(cl)}}
$('bLv').onclick=showLvls;
$('bRs').onclick=()=>loadLv(cl);
$('bUn').onclick=undo;
$('bMd').onclick=()=>{md=md==='single'?'dual':'single';
$('bMd').textContent=md==='single'?'单人':'双人';loadLv(cl)};
$('wR').onclick=()=>{ovW.classList.add('h');loadLv(cl)};
$('wN').onclick=()=>{ovW.classList.add('h');loadLv(cl<LV.length-1?cl+1:0)};
bindMenu();window.addEventListener('resize',rsz);rsz();requestAnimationFrame(render)
})();
