<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden;user-select:none}

.player-info.active{transform:scale(1.08)}
.p1-box{background:rgba(96,165,250,.12);border:2px solid rgba(96,165,250,.3)}
.p1-box.active{background:rgba(96,165,250,.22);border-color:#60a5fa;box-shadow:0 0 20px rgba(96,165,250,.3)}
.p2-box{background:rgba(244,114,182,.12);border:2px solid rgba(244,114,182,.3)}
.p2-box.active{background:rgba(244,114,182,.22);border-color:#f472b6;box-shadow:0 0 20px rgba(244,114,182,.3)}
.player-name{font-size:15px;font-weight:600;margin-bottom:2px}
.player-score{font-size:32px;font-weight:700}
.p1-box .player-name,.p1-box .player-score{color:#60a5fa}
.p2-box .player-name,.p2-box .player-score{color:#f472b6}
#turn-label{font-size:14px;color:#aaa;min-width:80px;text-align:center}
#board-wrap{position:relative;margin:6px 0 16px}
canvas{border-radius:16px;cursor:pointer;display:block}
#overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,26,.88);border-radius:16px;z-index:10}
#overlay.show{display:flex}
#overlay h2{font-size:36px;margin-bottom:6px}
#overlay .final-score{font-size:18px;margin-bottom:18px;color:#bbb}
#overlay button{padding:12px 36px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;transition:transform .15s}
#overlay button:hover{transform:scale(1.06)}
.controls{display:flex;gap:12px;margin-bottom:20px}
.controls button{padding:8px 22px;border:1px solid #444;border-radius:8px;background:rgba(255,255,255,.06);color:#ccc;font-size:13px;cursor:pointer;transition:all .15s}
.controls button:hover{background:rgba(255,255,255,.12);border-color:#888;color:#fff}
.size-btn.selected{background:rgba(96,165,250,.2);border-color:#60a5fa;color:#60a5fa}
.extra-turn-toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:22px;font-weight:700;pointer-events:none;z-index:5;opacity:0;transition:none}
.extra-turn-toast.show{animation:toastPop .9s ease forwards}
@keyframes toastPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}15%{transform:translate(-50%,-50%) scale(1.2);opacity:1}40%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-80%) scale(.8);opacity:0}}

/***** 移动端安全补丁 v2（不破坏原布局） *****/
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  min-height:100vh;
  overflow-x:hidden;
  -webkit-text-size-adjust:100%;
  padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));
}
button,.btn,[onclick],.cell,.tile,.square,.board-cell{cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none}
canvas{max-width:100vw;display:block}

@media (max-width:768px){
  h1{font-size:clamp(1.2rem,6vw,1.8rem)!important;margin:8px 0!important;letter-spacing:1px!important}
  h2{font-size:clamp(1rem,5vw,1.3rem)!important}
  h3{font-size:clamp(.9rem,4.5vw,1.1rem)!important}
  p{font-size:clamp(.85rem,3.5vw,1rem)!important}
  .btn,.button{padding:12px 20px!important;font-size:1rem!important;min-height:44px;border-radius:10px!important}
  .btn-sm{font-size:.9rem!important;padding:8px 14px!important}

  [style*="width:120"],[style*="width: 120"]{width:clamp(40px,12vw,72px)!important;height:clamp(40px,12vw,72px)!important;font-size:clamp(1.5rem,6vw,2.5rem)!important}
  [style*="width:100"],[style*="width: 100"]{width:clamp(40px,11vw,80px)!important;height:clamp(40px,11vw,80px)!important;font-size:clamp(1.4rem,5.5vw,2.2rem)!important}

  [style*="height:600"],[style*="height: 600"]{height:auto!important;aspect-ratio:1!important}

}
@media (max-width:480px){
  body{padding:6px!important}
  h1{font-size:1.15rem!important}
}
@media (hover:none) and (pointer:coarse){
  *:hover{transform:none!important}
}
</style>
</head>
<body>
<h1>点格棋 Dots and Boxes</h1>
<p class="subtitle">在点阵上画线，围成方格得分 — 长链博弈的经典策略游戏</p>
<div id="info-bar">
  <div class="player-info p1-box active" id="p1-info">
    <span class="player-name">🔵 玩家 1</span>
    <span class="player-score" id="p1-score">0</span>
  </div>
  <span id="turn-label">玩家 1 的回合</span>
  <div class="player-info p2-box" id="p2-info">
    <span class="player-name">玩家 2 🔴</span>
    <span class="player-score" id="p2-score">0</span>
  </div>
</div>
<div id="board-wrap">
  <canvas id="cv"></canvas>
  <div id="overlay">
    <h2 id="winner-text"></h2>
    <div class="final-score" id="final-score"></div>
    <button onclick="resetGame()">再来一局</button>
  </div>
  <div class="extra-turn-toast" id="extra-toast"></div>
</div>
<div class="controls">
  <button class="size-btn" data-size="5" onclick="changeSize(5)">5×5</button>
  <button class="size-btn selected" data-size="6" onclick="changeSize(6)">6×6</button>
  <button class="size-btn" data-size="7" onclick="changeSize(7)">7×7</button>
  <button onclick="resetGame()">重新开始</button>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const P1_COLOR = '#60a5fa';
const P2_COLOR = '#f472b6';
const DOT_COLOR = '#e0e0e0';
const LINE_HOVER = 'rgba(255,255,255,.25)';
const BG_COLOR = '#0f0f24';

let GRID = 6;
let DOT_R = 7, HIT_R = 18;
let PAD = 44;
let GAP, W;
let hLines, vLines, boxes;
let currentPlayer = 1;
let scores = [0, 0];
let gameOver = false;
let hoverEdge = null;
let particles = [];
let lineAnimations = [];
let boxAnimations = [];

function init() {
  GAP = Math.min(70, Math.floor((Math.min(window.innerWidth - 80, 520) - PAD * 2) / (GRID - 1)));
  W = PAD * 2 + GAP * (GRID - 1);
  cv.width = cv.height = W;
  document.getElementById('board-wrap').style.width = W + 'px';
  document.getElementById('board-wrap').style.height = W + 'px';

  hLines = Array.from({length: GRID}, () => Array(GRID - 1).fill(0));
  vLines = Array.from({length: GRID - 1}, () => Array(GRID).fill(0));
  boxes = Array.from({length: GRID - 1}, () => Array(GRID - 1).fill(0));
  currentPlayer = 1;
  scores = [0, 0];
  gameOver = false;
  hoverEdge = null;
  particles = [];
  lineAnimations = [];
  boxAnimations = [];
  updateUI();
  document.getElementById('overlay').classList.remove('show');
}

function dotPos(r, c) {
  return {x: PAD + c * GAP, y: PAD + r * GAP};
}

function updateUI() {
  document.getElementById('p1-score').textContent = scores[0];
  document.getElementById('p2-score').textContent = scores[1];
  document.getElementById('p1-info').classList.toggle('active', currentPlayer === 1);
  document.getElementById('p2-info').classList.toggle('active', currentPlayer === 2);
  document.getElementById('turn-label').textContent = `玩家 ${currentPlayer} 的回合`;
}

function showExtraTurn(player) {
  const toast = document.getElementById('extra-toast');
  toast.textContent = `🎯 玩家 ${player} 额外一步！`;
  toast.style.color = player === 1 ? P1_COLOR : P2_COLOR;
  toast.classList.remove('show');
  void toast.offsetWidth;
  toast.classList.add('show');
}

function edgeKey(type, r, c) { return type + '-' + r + '-' + c; }

function getEdge(x, y) {
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID - 1; c++) {
      let p1 = dotPos(r, c), p2 = dotPos(r, c + 1);
      let mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
      if (Math.abs(x - mx) < HIT_R && Math.abs(y - my) < HIT_R && hLines[r][c] === 0) {
        return {type: 'h', r, c};
      }
    }
  }
  for (let r = 0; r < GRID - 1; r++) {
    for (let c = 0; c < GRID; c++) {
      let p1 = dotPos(r, c), p2 = dotPos(r + 1, c);
      let mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
      if (Math.abs(x - mx) < HIT_R && Math.abs(y - my) < HIT_R && vLines[r][c] === 0) {
        return {type: 'v', r, c};
      }
    }
  }
  return null;
}

function placeLine(edge) {
  let {type, r, c} = edge;
  let player = currentPlayer;
  if (type === 'h') hLines[r][c] = player;
  else vLines[r][c] = player;

  let p1 = type === 'h' ? dotPos(r, c) : dotPos(r, c);
  let p2 = type === 'h' ? dotPos(r, c + 1) : dotPos(r + 1, c);
  lineAnimations.push({x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, t: 0, color: player === 1 ? P1_COLOR : P2_COLOR});
  spawnLineParticles(p1.x, p1.y, p2.x, p2.y, player === 1 ? P1_COLOR : P2_COLOR);

  let scored = 0;
  if (type === 'h') {
    if (r > 0 && checkBox(r - 1, c)) { boxes[r - 1][c] = player; scored++; spawnBoxParticles(r - 1, c, player); }
    if (r < GRID - 1 && checkBox(r, c)) { boxes[r][c] = player; scored++; spawnBoxParticles(r, c, player); }
  } else {
    if (c > 0 && checkBox(r, c - 1)) { boxes[r][c - 1] = player; scored++; spawnBoxParticles(r, c - 1, player); }
    if (c < GRID - 1 && checkBox(r, c)) { boxes[r][c] = player; scored++; spawnBoxParticles(r, c, player); }
  }

  if (scored > 0) {
    scores[player - 1] += scored;
    showExtraTurn(player);
    // check if game over
    let totalBoxes = (GRID - 1) * (GRID - 1);
    if (scores[0] + scores[1] === totalBoxes) {
      gameOver = true;
      setTimeout(showGameOver, 800);
    }
  } else {
    currentPlayer = currentPlayer === 1 ? 2 : 1;
  }
  updateUI();
}

function checkBox(r, c) {
  if (boxes[r][c] !== 0) return false;
  return hLines[r][c] && hLines[r + 1][c] && vLines[r][c] && vLines[r][c + 1];
}

function showGameOver() {
  let ov = document.getElementById('overlay');
  let wt = document.getElementById('winner-text');
  let fs = document.getElementById('final-score');
  if (scores[0] > scores[1]) {
    wt.innerHTML = '🏆 玩家 1 获胜！';
    wt.style.color = P1_COLOR;
  } else if (scores[1] > scores[0]) {
    wt.innerHTML = '🏆 玩家 2 获胜！';
    wt.style.color = P2_COLOR;
  } else {
    wt.innerHTML = '🤝 平局！';
    wt.style.color = '#a78bfa';
  }
  fs.textContent = `${scores[0]} : ${scores[1]}`;
  ov.classList.add('show');
  spawnVictoryParticles();
}

// --- Particles ---
function spawnLineParticles(x1, y1, x2, y2, color) {
  let count = 12;
  for (let i = 0; i < count; i++) {
    let t = Math.random();
    let px = x1 + (x2 - x1) * t;
    let py = y1 + (y2 - y1) * t;
    let angle = Math.random() * Math.PI * 2;
    let speed = 1 + Math.random() * 2.5;
    particles.push({x: px, y: py, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, decay: 0.015 + Math.random() * 0.02, r: 2 + Math.random() * 2.5, color});
  }
}

function spawnBoxParticles(r, c, player) {
  let tl = dotPos(r, c), br = dotPos(r + 1, c + 1);
  let cx = (tl.x + br.x) / 2, cy = (tl.y + br.y) / 2;
  let color = player === 1 ? P1_COLOR : P2_COLOR;
  boxAnimations.push({x: tl.x, y: tl.y, w: br.x - tl.x, h: br.y - tl.y, t: 0, color});
  for (let i = 0; i < 20; i++) {
    let angle = Math.random() * Math.PI * 2;
    let speed = 2 + Math.random() * 4;
    particles.push({x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, decay: 0.01 + Math.random() * 0.015, r: 2 + Math.random() * 3, color});
  }
}

function spawnVictoryParticles() {
  let colors = [P1_COLOR, P2_COLOR, '#a78bfa', '#fbbf24', '#34d399'];
  for (let i = 0; i < 80; i++) {
    let angle = Math.random() * Math.PI * 2;
    let speed = 2 + Math.random() * 5;
    particles.push({
      x: W / 2 + (Math.random() - .5) * 60,
      y: W / 2 + (Math.random() - .5) * 60,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1, decay: 0.005 + Math.random() * 0.01,
      r: 2.5 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

// --- Drawing ---
function draw() {
  ctx.fillStyle = BG_COLOR;
  ctx.fillRect(0, 0, W, W);

  // Draw boxes
  for (let r = 0; r < GRID - 1; r++) {
    for (let c = 0; c < GRID - 1; c++) {
      if (boxes[r][c]) {
        let tl = dotPos(r, c), br = dotPos(r + 1, c + 1);
        let color = boxes[r][c] === 1 ? P1_COLOR : P2_COLOR;
        ctx.fillStyle = hexToRgba(color, 0.18);
        ctx.beginPath();
        ctx.roundRect(tl.x + 2, tl.y + 2, br.x - tl.x - 4, br.y - tl.y - 4, 4);
        ctx.fill();
      }
    }
  }

  // Box fill animations
  for (let i = boxAnimations.length - 1; i >= 0; i--) {
    let a = boxAnimations[i];
    a.t += 0.04;
    if (a.t >= 1) { boxAnimations.splice(i, 1); continue; }
    let alpha = 0.4 * (1 - a.t);
    ctx.fillStyle = hexToRgba(a.color, alpha);
    let expand = a.t * 8;
    ctx.beginPath();
    ctx.roundRect(a.x - expand, a.y - expand, a.w + expand * 2, a.h + expand * 2, 6);
    ctx.fill();
  }

  // Draw lines
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID - 1; c++) {
      if (hLines[r][c]) {
        let p1 = dotPos(r, c), p2 = dotPos(r, c + 1);
        drawLine(p1.x, p1.y, p2.x, p2.y, hLines[r][c] === 1 ? P1_COLOR : P2_COLOR);
      }
    }
  }
  for (let r = 0; r < GRID - 1; r++) {
    for (let c = 0; c < GRID; c++) {
      if (vLines[r][c]) {
        let p1 = dotPos(r, c), p2 = dotPos(r + 1, c);
        drawLine(p1.x, p1.y, p2.x, p2.y, vLines[r][c] === 1 ? P1_COLOR : P2_COLOR);
      }
    }
  }

  // Line draw animations
  for (let i = lineAnimations.length - 1; i >= 0; i--) {
    let a = lineAnimations[i];
    a.t += 0.06;
    if (a.t >= 1) { lineAnimations.splice(i, 1); continue; }
    let alpha = 0.7 * (1 - a.t);
    ctx.strokeStyle = hexToRgba(a.color, alpha);
    ctx.lineWidth = 4 + a.t * 8;
    ctx.beginPath();
    ctx.moveTo(a.x1, a.y1);
    ctx.lineTo(a.x2, a.y2);
    ctx.stroke();
  }

  // Hover preview
  if (hoverEdge && !gameOver) {
    let {type, r, c} = hoverEdge;
    ctx.strokeStyle = LINE_HOVER;
    ctx.lineWidth = 4;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    if (type === 'h') {
      let p1 = dotPos(r, c), p2 = dotPos(r, c + 1);
      ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
    } else {
      let p1 = dotPos(r, c), p2 = dotPos(r + 1, c);
      ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw dots
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      let p = dotPos(r, c);
      ctx.beginPath();
      ctx.arc(p.x, p.y, DOT_R, 0, Math.PI * 2);
      ctx.fillStyle = DOT_COLOR;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(p.x, p.y, DOT_R + 2, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,.08)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.04;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(draw);
}

function drawLine(x1, y1, x2, y2, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  ctx.strokeStyle = hexToRgba(color, 0.2);
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

function hexToRgba(hex, alpha) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// --- Events ---
function getCanvasPos(e) {
  let rect = cv.getBoundingClientRect();
  let scaleX = cv.width / rect.width;
  let scaleY = cv.height / rect.height;
  let clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY};
}

cv.addEventListener('mousemove', e => {
  if (gameOver) return;
  let {x, y} = getCanvasPos(e);
  hoverEdge = getEdge(x, y);
});

cv.addEventListener('mouseleave', () => { hoverEdge = null; });

cv.addEventListener('click', e => {
  if (gameOver) return;
  let {x, y} = getCanvasPos(e);
  let edge = getEdge(x, y);
  if (edge) placeLine(edge);
});

cv.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameOver) return;
  let {x, y} = getCanvasPos(e);
  let edge = getEdge(x, y);
  if (edge) placeLine(edge);
}, {passive: false});

function resetGame() { init(); }

function changeSize(s) {
  GRID = s;
  document.querySelectorAll('.size-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.size) === s);
  });
  init();
}

// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
  };
}

init();
draw();
