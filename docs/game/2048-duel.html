<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Duel - 双人对战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  color: #fff;
}

h1 {
  margin-top: 20px;
  font-size: 2.4rem;
  background: linear-gradient(90deg, #f7971e, #ffd200);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 0.9rem;
  color: #8892b0;
  margin-bottom: 16px;
}

.game-container {
  display: flex;
  gap: 40px;
  align-items: flex-start;
  justify-content: center;
  flex-wrap: wrap;
  padding: 10px;
}

.player-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

.player-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
  width: 100%;
  justify-content: space-between;
}

.player-name {
  font-size: 1.3rem;
  font-weight: 700;
  padding: 6px 18px;
  border-radius: 8px;
}

.player1 .player-name { background: linear-gradient(135deg, #667eea, #764ba2); }
.player2 .player-name { background: linear-gradient(135deg, #f093fb, #f5576c); }

.score-box {
  font-size: 1rem;
  background: rgba(255,255,255,0.08);
  padding: 6px 16px;
  border-radius: 8px;
  min-width: 100px;
  text-align: center;
}

.score-box span {
  font-weight: 700;
  font-size: 1.2rem;
  color: #ffd200;
}

.board-wrapper {
  position: relative;
  padding: 10px;
  border-radius: 16px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(6px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.board {
  position: relative;
  width: 340px;
  height: 340px;
  border-radius: 12px;
  background: #1e293b;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 8px;
}

.cell {
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
}

.tile-layer {
  position: absolute;
  top: 8px;
  left: 8px;
  width: calc(100% - 16px);
  height: calc(100% - 16px);
  pointer-events: none;
}

.tile {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  border-radius: 8px;
  transition: top 0.12s ease, left 0.12s ease;
  z-index: 2;
}

.tile.merged {
  animation: pop 0.25s ease;
  z-index: 3;
}

.tile.new-tile {
  animation: appear 0.2s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); }
  100% { transform: scale(1); }
}

@keyframes appear {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.vs-badge {
  font-size: 2.5rem;
  font-weight: 900;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  align-self: center;
  margin-top: 80px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.15); opacity: 0.8; }
}

.controls-info {
  margin-top: 10px;
  font-size: 0.8rem;
  color: #64748b;
  text-align: center;
}

.btn-row {
  margin-top: 18px;
  display: flex;
  gap: 12px;
}

.btn {
  padding: 10px 28px;
  font-size: 1rem;
  font-weight: 600;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}

.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

.btn-new {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
}

.btn-reset {
  background: linear-gradient(135deg, #f093fb, #f5576c);
  color: #fff;
}

.winner-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.winner-overlay.active { display: flex; }

.winner-text {
  font-size: 3rem;
  font-weight: 900;
  margin-bottom: 20px;
  animation: winPulse 1s infinite alternate;
}

@keyframes winPulse {
  0% { transform: scale(1); }
  100% { transform: scale(1.08); }
}

.winner-sub {
  font-size: 1.2rem;
  color: #ccc;
  margin-bottom: 30px;
}

canvas.particle-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 101;
}

.key-hint {
  display: inline-block;
  background: rgba(255,255,255,0.1);
  padding: 2px 8px;
  border-radius: 4px;
  font-family: monospace;
  font-size: 0.8rem;
  margin: 0 2px;
}
</style>
</head>
<body>

<h1>2048 Duel</h1>
<p class="subtitle">双人对战 · 谁先达到 2048 获胜</p>

<div class="game-container">
  <div class="player-section player1">
    <div class="player-header">
      <div class="player-name">玩家 1</div>
      <div class="score-box">分数: <span id="score1">0</span></div>
    </div>
    <div class="board-wrapper">
      <div class="board" id="board1">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="tile-layer" id="tiles1"></div>
      </div>
    </div>
    <div class="controls-info">
      移动: <span class="key-hint">W</span><span class="key-hint">A</span><span class="key-hint">S</span><span class="key-hint">D</span>
    </div>
  </div>

  <div class="vs-badge">VS</div>

  <div class="player-section player2">
    <div class="player-header">
      <div class="player-name">玩家 2</div>
      <div class="score-box">分数: <span id="score2">0</span></div>
    </div>
    <div class="board-wrapper">
      <div class="board" id="board2">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="tile-layer" id="tiles2"></div>
      </div>
    </div>
    <div class="controls-info">
      移动: <span class="key-hint">↑</span><span class="key-hint">←</span><span class="key-hint">↓</span><span class="key-hint">→</span>
    </div>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-new" onclick="newGame()">新游戏</button>
  <button class="btn btn-reset" onclick="newGame()">重新开始</button>
</div>

<div class="winner-overlay" id="winnerOverlay">
  <canvas class="particle-canvas" id="particleCanvas"></canvas>
  <div class="winner-text" id="winnerText"></div>
  <div class="winner-sub">点击任意位置或按空格键开始新游戏</div>
</div>

<script>
const TILE_COLORS = {
  2:    { bg: '#e2e8f0', color: '#1e293b', size: '2rem' },
  4:    { bg: '#fde68a', color: '#1e293b', size: '2rem' },
  8:    { bg: '#fb923c', color: '#fff',    size: '2rem' },
  16:   { bg: '#f97316', color: '#fff',    size: '1.8rem' },
  32:   { bg: '#ef4444', color: '#fff',    size: '1.8rem' },
  64:   { bg: '#dc2626', color: '#fff',    size: '1.8rem' },
  128:  { bg: '#facc15', color: '#fff',    size: '1.5rem' },
  256:  { bg: '#eab308', color: '#fff',    size: '1.5rem' },
  512:  { bg: '#a855f7', color: '#fff',    size: '1.5rem' },
  1024: { bg: '#7c3aed', color: '#fff',    size: '1.2rem' },
  2048: { bg: '#fbbf24', color: '#fff',    size: '1.2rem' },
};

function getColor(v) {
  return TILE_COLORS[v] || { bg: '#0f172a', color: '#fff', size: '1rem' };
}

const CELL_SIZE = 75;
const GAP = 8;
const STEP = CELL_SIZE + GAP;

function posStyle(r, c) {
  return { top: r * STEP + 'px', left: c * STEP + 'px', width: CELL_SIZE + 'px', height: CELL_SIZE + 'px' };
}

class Game2048 {
  constructor(tileLayerId, scoreId, particleColor) {
    this.tileLayer = document.getElementById(tileLayerId);
    this.scoreEl = document.getElementById(scoreId);
    this.particleColor = particleColor;
    this.grid = [];
    this.score = 0;
    this.won = false;
    this.over = false;
    this.tileId = 0;
    this.init();
  }

  init() {
    this.grid = Array.from({ length: 4 }, () => Array(4).fill(null));
    this.score = 0;
    this.won = false;
    this.over = false;
    this.tileLayer.innerHTML = '';
    this.scoreEl.textContent = '0';
    this.addRandom();
    this.addRandom();
    this.render();
  }

  emptyCells() {
    const cells = [];
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++)
        if (!this.grid[r][c]) cells.push({ r, c });
    return cells;
  }

  addRandom() {
    const cells = this.emptyCells();
    if (!cells.length) return;
    const { r, c } = cells[Math.floor(Math.random() * cells.length)];
    const val = Math.random() < 0.9 ? 2 : 4;
    this.grid[r][c] = { val, id: ++this.tileId, isNew: true, merged: false };
  }

  render() {
    this.tileLayer.innerHTML = '';
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 4; c++) {
        const t = this.grid[r][c];
        if (!t) continue;
        const el = document.createElement('div');
        el.className = 'tile' + (t.merged ? ' merged' : '') + (t.isNew ? ' new-tile' : '');
        const style = getColor(t.val);
        const pos = posStyle(r, c);
        el.style.top = pos.top;
        el.style.left = pos.left;
        el.style.width = pos.width;
        el.style.height = pos.height;
        el.style.background = style.bg;
        el.style.color = style.color;
        el.style.fontSize = style.size;
        el.textContent = t.val;
        this.tileLayer.appendChild(el);
        t.isNew = false;
        t.merged = false;
      }
    }
  }

  move(dir) {
    if (this.over || this.won) return false;
    let moved = false;
    const mergePositions = [];

    const rotated = this.rotateForDir(dir);

    for (let r = 0; r < 4; r++) {
      let row = rotated[r].filter(x => x !== null);
      const newRow = [];
      for (let i = 0; i < row.length; i++) {
        if (i + 1 < row.length && row[i].val === row[i + 1].val) {
          const newVal = row[i].val * 2;
          this.score += newVal;
          newRow.push({ val: newVal, id: ++this.tileId, isNew: false, merged: true });
          mergePositions.push({ r, c: newRow.length - 1, val: newVal });
          i++;
          moved = true;
        } else {
          newRow.push(row[i]);
        }
      }
      while (newRow.length < 4) newRow.push(null);
      rotated[r] = newRow;
    }

    this.unrotate(rotated, dir);

    if (!moved) {
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++) {
          const old = this.grid[r][c];
          const nw = rotated[r][c];
          if ((!old && nw) || (old && !nw) || (old && nw && old.val !== nw.val))
            moved = true;
        }
    }

    if (moved) {
      this.grid = rotated;
      this.scoreEl.textContent = this.score;
      this.addRandom();
      this.render();

      for (const mp of mergePositions) {
        const actual = this.rotateCoord(mp.r, mp.c, dir);
        this.spawnMergeParticles(actual.r, actual.c, mp.val);
      }

      if (this.hasWon()) {
        this.won = true;
        spawnWinParticles(this.particleColor);
        showWinner(this === game1 ? 1 : 2);
      } else if (this.isGameOver()) {
        this.over = true;
      }
    }
    return moved;
  }

  rotateForDir(dir) {
    let g = this.grid.map(row => [...row]);
    if (dir === 'left') return g;
    if (dir === 'right') return g.map(row => row.slice().reverse());
    if (dir === 'up') return this.transpose(g);
    if (dir === 'down') return this.transpose(g).map(row => row.slice().reverse());
    return g;
  }

  unrotate(g, dir) {
    if (dir === 'right') g.forEach(row => row.reverse());
    else if (dir === 'up') { const t = this.transpose(g); for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) g[r][c] = t[r][c]; }
    else if (dir === 'down') { g.forEach(row => row.reverse()); const t = this.transpose(g); for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) g[r][c] = t[r][c]; }
  }

  rotateCoord(r, c, dir) {
    if (dir === 'left') return { r, c };
    if (dir === 'right') return { r, c: 3 - c };
    if (dir === 'up') return { r: c, c: r };
    if (dir === 'down') return { r: 3 - c, c: r };
    return { r, c };
  }

  transpose(g) {
    return g[0].map((_, i) => g.map(row => row[i]));
  }

  hasWon() {
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++)
        if (this.grid[r][c] && this.grid[r][c].val >= 2048) return true;
    return false;
  }

  isGameOver() {
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++) {
        if (!this.grid[r][c]) return false;
        const v = this.grid[r][c].val;
        if (c + 1 < 4 && this.grid[r][c + 1] && this.grid[r][c + 1].val === v) return false;
        if (r + 1 < 4 && this.grid[r + 1][c] && this.grid[r + 1][c].val === v) return false;
      }
    return true;
  }

  spawnMergeParticles(r, c, val) {
    const board = this.tileLayer.parentElement;
    const rect = board.getBoundingClientRect();
    const x = rect.left + 8 + c * STEP + CELL_SIZE / 2;
    const y = rect.top + 8 + r * STEP + CELL_SIZE / 2;
    const count = Math.min(val / 2, 30);
    const color = getColor(val).bg;
    for (let i = 0; i < count; i++) {
      createParticle(x, y, color);
    }
  }
}

// ---- Particle System ----
const particles = [];
let particleRAF = null;

function createParticle(x, y, color) {
  const angle = Math.random() * Math.PI * 2;
  const speed = 1.5 + Math.random() * 3;
  particles.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 1,
    decay: 0.015 + Math.random() * 0.025,
    size: 2 + Math.random() * 4,
    color
  });
  if (!particleRAF) animateParticles();
}

function spawnWinParticles(baseColor) {
  const canvas = document.getElementById('particleCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const colors = ['#fbbf24', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#22c55e', '#ec4899', baseColor];
  for (let i = 0; i < 200; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 8;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: 0.005 + Math.random() * 0.01,
      size: 3 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
  if (!particleRAF) animateParticles();
}

function animateParticles() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }

  if (particles.length > 0) {
    particleRAF = requestAnimationFrame(animateParticles);
  } else {
    particleRAF = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

// ---- Game Flow ----
let game1, game2;

function newGame() {
  document.getElementById('winnerOverlay').classList.remove('active');
  game1 = new Game2048('tiles1', 'score1', '#667eea');
  game2 = new Game2048('tiles2', 'score2', '#f5576c');
}

function showWinner(playerNum) {
  const overlay = document.getElementById('winnerOverlay');
  const text = document.getElementById('winnerText');
  text.textContent = `玩家 ${playerNum} 获胜!`;
  text.style.background = playerNum === 1
    ? 'linear-gradient(135deg, #667eea, #764ba2)'
    : 'linear-gradient(135deg, #f093fb, #f5576c)';
  text.style.webkitBackgroundClip = 'text';
  text.style.webkitTextFillColor = 'transparent';
  overlay.classList.add('active');
}

document.addEventListener('keydown', (e) => {
  const overlay = document.getElementById('winnerOverlay');
  if (overlay.classList.contains('active')) {
    if (e.code === 'Space' || e.code === 'Enter') newGame();
    overlay.addEventListener('click', newGame, { once: true });
    return;
  }

  let handled = true;
  switch (e.code) {
    case 'KeyW': game1.move('up'); break;
    case 'KeyS': game1.move('down'); break;
    case 'KeyA': game1.move('left'); break;
    case 'KeyD': game1.move('right'); break;
    case 'ArrowUp': game2.move('up'); break;
    case 'ArrowDown': game2.move('down'); break;
    case 'ArrowLeft': game2.move('left'); break;
    case 'ArrowRight': game2.move('right'); break;
    default: handled = false;
  }
  if (handled) e.preventDefault();
});

document.getElementById('winnerOverlay').addEventListener('click', () => {
  if (document.getElementById('winnerOverlay').classList.contains('active')) newGame();
});

newGame();
</script>
</body>
</html>
