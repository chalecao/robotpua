<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆翻牌 Memory Match</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;--card-bg:#1a1a2e;--card-front:#16213e;
  --p1:#ff6b6b;--p2:#4ecdc4;--gold:#ffd93d;
  --glow1:rgba(255,107,107,.4);--glow2:rgba(78,205,196,.4);
}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:#eee;overflow:hidden}
body{display:flex;flex-direction:column;align-items:center;justify-content:center}

#particles-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}

.header{text-align:center;margin-bottom:18px;position:relative;z-index:1}
.header h1{font-size:1.6rem;letter-spacing:2px;background:linear-gradient(135deg,var(--p1),var(--gold),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}

.scoreboard{display:flex;gap:30px;justify-content:center;align-items:center;font-size:1rem}
.player-score{padding:8px 20px;border-radius:12px;font-weight:700;transition:all .3s}
.player-score.active{transform:scale(1.1)}
.p1{background:rgba(255,107,107,.15);border:2px solid var(--p1)}
.p1.active{box-shadow:0 0 18px var(--glow1)}
.p2{background:rgba(78,205,196,.15);border:2px solid var(--p2)}
.p2.active{box-shadow:0 0 18px var(--glow2)}
.vs{color:#555;font-weight:400;font-size:.9rem}

.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;perspective:1000px;position:relative;z-index:1}

.card{width:90px;height:90px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1)}
.card.flipped{transform:rotateY(180deg)}
.card.matched{pointer-events:none}
.card.matched .card-front{animation:matchPulse .6s ease}

.card-face{position:absolute;width:100%;height:100%;border-radius:14px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;font-size:2.4rem;user-select:none}
.card-back{background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid #2a2a4a;box-shadow:0 4px 15px rgba(0,0,0,.3)}
.card-back::after{content:'';position:absolute;width:40px;height:40px;border:2px solid #3a3a5a;border-radius:50%;opacity:.4}
.card-back:hover{border-color:#4a4a6a;box-shadow:0 4px 20px rgba(100,100,200,.2)}
.card-front{background:linear-gradient(135deg,var(--card-front),#0f3460);border:2px solid #3a5a8a;transform:rotateY(180deg);box-shadow:0 4px 15px rgba(0,0,0,.3)}

.card.matched-p1 .card-front{border-color:var(--p1);box-shadow:0 0 15px var(--glow1)}
.card.matched-p2 .card-front{border-color:var(--p2);box-shadow:0 0 15px var(--glow2)}

.turn-indicator{margin-top:16px;font-size:.95rem;letter-spacing:1px;opacity:.8;position:relative;z-index:1;transition:color .3s}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .4s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:#1a1a2e;border:2px solid #3a3a5a;border-radius:20px;padding:40px 50px;text-align:center;transform:scale(.8);transition:transform .4s}
.modal-overlay.show .modal{transform:scale(1)}
.modal h2{font-size:1.8rem;margin-bottom:10px}
.modal .result{font-size:1.1rem;color:#aaa;margin-bottom:24px}
.modal button{padding:12px 36px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .2s}
.modal button:hover{transform:scale(1.05)}

@keyframes matchPulse{
  0%{transform:rotateY(180deg) scale(1)}
  50%{transform:rotateY(180deg) scale(1.15)}
  100%{transform:rotateY(180deg) scale(1)}
}
@media(max-width:500px){
  .card{width:72px;height:72px}
  .board{gap:8px}
  .card-face{font-size:1.8rem}
  .header h1{font-size:1.2rem}
}
</style>
</head>
<body>
<canvas id="particles-canvas"></canvas>

<div class="header">
  <h1>记忆翻牌 Memory Match</h1>
  <div class="scoreboard">
    <div class="player-score p1 active" id="p1">🔴 玩家1: <span id="score1">0</span></div>
    <div class="vs">VS</div>
    <div class="player-score p2" id="p2">🟢 玩家2: <span id="score2">0</span></div>
  </div>
</div>

<div class="board" id="board"></div>
<div class="turn-indicator" id="turn">玩家1 的回合</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">🎉 游戏结束</h2>
    <div class="result" id="modal-result"></div>
    <button onclick="initGame()">再来一局</button>
  </div>
</div>

<script>
const SYMBOLS = ['❀','✦','★','♠','♦','♣','♥','✿'];
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let currentPlayer = 1, scores = [0,0], flipped = [], lockBoard = false, matchedPairs = 0;

function resizeCanvas(){canvas.width=innerWidth;canvas.height=innerHeight}
addEventListener('resize',resizeCanvas);resizeCanvas();

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*i+1|0;[a[i],a[j]]=[a[j],a[i]]}return a}

function initGame(){
  currentPlayer=1;scores=[0,0];flipped=[];lockBoard=false;matchedPairs=0;
  document.getElementById('score1').textContent='0';
  document.getElementById('score2').textContent='0';
  document.getElementById('modal').classList.remove('show');
  updateTurn();
  const deck=shuffle([...SYMBOLS,...SYMBOLS]);
  const board=document.getElementById('board');
  board.innerHTML='';
  deck.forEach((sym,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.symbol=sym;
    card.dataset.index=i;
    card.innerHTML=`<div class="card-face card-back"></div><div class="card-face card-front">${sym}</div>`;
    card.addEventListener('click',()=>flipCard(card));
    board.appendChild(card);
  });
}

function flipCard(card){
  if(lockBoard||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');
  const rect=card.getBoundingClientRect();
  emitFlipParticles(rect.left+rect.width/2,rect.top+rect.height/2);
  flipped.push(card);
  if(flipped.length===2){
    lockBoard=true;
    const[a,b]=flipped;
    if(a.dataset.symbol===b.dataset.symbol){
      scores[currentPlayer-1]++;
      document.getElementById('score'+currentPlayer).textContent=scores[currentPlayer-1];
      setTimeout(()=>{
        a.classList.add('matched','matched-p'+currentPlayer);
        b.classList.add('matched','matched-p'+currentPlayer);
        const ra=a.getBoundingClientRect(),rb=b.getBoundingClientRect();
        emitMatchParticles(ra.left+ra.width/2,ra.top+ra.height/2,currentPlayer);
        emitMatchParticles(rb.left+rb.width/2,rb.top+rb.height/2,currentPlayer);
        matchedPairs++;
        flipped=[];lockBoard=false;
        if(matchedPairs===8)endGame();
      },500);
    }else{
      setTimeout(()=>{
        a.classList.remove('flipped');b.classList.remove('flipped');
        flipped=[];lockBoard=false;
        currentPlayer=currentPlayer===1?2:1;
        updateTurn();
      },900);
    }
  }
}

function updateTurn(){
  const el=document.getElementById('turn');
  el.textContent=`玩家${currentPlayer} 的回合`;
  el.style.color=currentPlayer===1?'var(--p1)':'var(--p2)';
  document.getElementById('p1').classList.toggle('active',currentPlayer===1);
  document.getElementById('p2').classList.toggle('active',currentPlayer===2);
}

function endGame(){
  setTimeout(()=>{
    const t=document.getElementById('modal-title');
    const r=document.getElementById('modal-result');
    if(scores[0]>scores[1]){t.textContent='🎉 玩家1 获胜!';r.textContent=`${scores[0]} : ${scores[1]}`}
    else if(scores[1]>scores[0]){t.textContent='🎉 玩家2 获胜!';r.textContent=`${scores[0]} : ${scores[1]}`}
    else{t.textContent='🤝 平局!';r.textContent=`${scores[0]} : ${scores[1]}`}
    document.getElementById('modal').classList.add('show');
    for(let i=0;i<8;i++)setTimeout(()=>emitCelebration(),i*120);
  },600);
}

/* ---- Particle System ---- */
class Particle{
  constructor(x,y,color,vx,vy,life,size){
    this.x=x;this.y=y;this.color=color;this.vx=vx;this.vy=vy;
    this.life=life;this.maxLife=life;this.size=size;this.gravity=0.08;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.gravity;this.life--}
  draw(){
    const alpha=this.life/this.maxLife;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=this.color;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size*alpha,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }
}

function emitFlipParticles(x,y){
  const colors=['#a78bfa','#818cf8','#c4b5fd','#e0e7ff'];
  for(let i=0;i<12;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=1+Math.random()*2.5;
    particles.push(new Particle(x,y,colors[Math.random()*colors.length|0],Math.cos(angle)*speed,Math.sin(angle)*speed-1,30+Math.random()*20,2+Math.random()*2));
  }
}

function emitMatchParticles(x,y,player){
  const base=player===1?['#ff6b6b','#ff8787','#ffa8a8','#ffd4d4']:['#4ecdc4','#6ee7de','#a7f3d0','#d1fae5'];
  for(let i=0;i<30;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*4;
    particles.push(new Particle(x,y,base[Math.random()*base.length|0],Math.cos(angle)*speed,Math.sin(angle)*speed-2,40+Math.random()*30,2.5+Math.random()*3));
  }
}

function emitCelebration(){
  const x=Math.random()*innerWidth;
  const y=innerHeight*0.3+Math.random()*innerHeight*0.3;
  const colors=['#ff6b6b','#4ecdc4','#ffd93d','#a78bfa','#f472b6','#34d399','#fb923c','#60a5fa'];
  for(let i=0;i<40;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*5;
    particles.push(new Particle(x,y,colors[Math.random()*colors.length|0],Math.cos(angle)*speed,Math.sin(angle)*speed-3,50+Math.random()*40,2+Math.random()*4));
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.update();p.draw()});
  requestAnimationFrame(animate);
}
animate();
initGame();
</script>
</body>
</html>
